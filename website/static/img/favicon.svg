  <circle cx="19" cy="14.5" r="2" fill="#7DD3FC"/>
  <circle cx="13" cy="14.5" r="0.8" fill="white"/>
  <circle cx="19" cy="14.5" r="0.8" fill="white"/>

  <!-- Antenna -->
