<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <rect width="800" height="500" fill="#FAFAFA" rx="8"/>
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333333">Spec-Driven Development (SDD) Flow</text>

  <defs>
    <marker id="sddArrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#049CD8"/>
    </marker>
    <marker id="sddArrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#43B047"/>
    </marker>
    <marker id="sddArrowGo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#FBD000"/>
    </marker>
    <marker id="sddArrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E52521"/>
    </marker>
  </defs>

  <!-- Central text -->
  <circle cx="400" cy="240" r="68" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
  <text x="400" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">SDD</text>
  <text x="400" y="243" text-anchor="middle" font-size="10" fill="#333333">Specs First,</text>
  <text x="400" y="258" text-anchor="middle" font-size="10" fill="#333333">Code Second</text>

  <!-- Step 1: Write Spec (top-left, blue) -->
  <rect x="95" y="60" width="155" height="65" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
  <text x="172" y="83" text-anchor="middle" font-size="8" font-weight="bold" fill="#049CD8">STEP 1</text>
  <text x="172" y="99" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">Write Spec</text>
  <text x="172" y="115" text-anchor="middle" font-size="9" fill="#666">Define requirements, API</text>

  <!-- Step 2: Review Spec (top-right, blue) -->
  <rect x="540" y="60" width="155" height="65" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
  <text x="617" y="83" text-anchor="middle" font-size="8" font-weight="bold" fill="#049CD8">STEP 2</text>
  <text x="617" y="99" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">Review Spec</text>
  <text x="617" y="115" text-anchor="middle" font-size="9" fill="#666">Team validates design</text>

  <!-- Step 3: Agent Generates Code (right, green) -->
  <rect x="600" y="210" width="170" height="65" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2.5"/>
  <text x="685" y="233" text-anchor="middle" font-size="8" font-weight="bold" fill="#43B047">STEP 3</text>
  <text x="685" y="249" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">Agent Generates</text>
  <text x="685" y="265" text-anchor="middle" font-size="9" fill="#666">AI writes code from spec</text>

  <!-- Step 4: Automated Validation (bottom-right, gold) -->
  <rect x="540" y="370" width="155" height="65" rx="8" fill="#FFFFFF" stroke="#FBD000" stroke-width="2.5"/>
  <text x="617" y="393" text-anchor="middle" font-size="8" font-weight="bold" fill="#D4A800">STEP 4</text>
  <text x="617" y="409" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">Validate</text>
  <text x="617" y="425" text-anchor="middle" font-size="9" fill="#666">Tests, linting, CI checks</text>

  <!-- Step 5: Human Review (bottom-left, gold) -->
  <rect x="95" y="370" width="155" height="65" rx="8" fill="#FFFFFF" stroke="#FBD000" stroke-width="2.5"/>
  <text x="172" y="393" text-anchor="middle" font-size="8" font-weight="bold" fill="#D4A800">STEP 5</text>
  <text x="172" y="409" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">Human Review</text>
  <text x="172" y="425" text-anchor="middle" font-size="9" fill="#666">PR review, approve/reject</text>

  <!-- Step 6: Iterate or Merge (left, red/green) -->
  <rect x="20" y="210" width="155" height="65" rx="8" fill="#FFFFFF" stroke="#E52521" stroke-width="2.5"/>
  <text x="97" y="233" text-anchor="middle" font-size="8" font-weight="bold" fill="#E52521">STEP 6</text>
  <text x="97" y="249" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">Iterate / Merge</text>
  <text x="97" y="265" text-anchor="middle" font-size="9" fill="#666">Fix issues or ship it</text>

  <!-- Arrows connecting steps in circular flow -->
  <!-- Step 1 → Step 2 -->
  <line x1="250" y1="90" x2="540" y2="90" stroke="#049CD8" stroke-width="2" marker-end="url(#sddArrowB)"/>
  <text x="395" y="83" text-anchor="middle" font-size="8" fill="#049CD8">Team aligns on spec</text>

  <!-- Step 2 → Step 3 -->
  <path d="M660,125 Q690,160 690,210" stroke="#43B047" stroke-width="2" fill="none" marker-end="url(#sddArrowG)"/>

  <!-- Step 3 → Step 4 -->
  <path d="M690,275 Q690,325 650,370" stroke="#FBD000" stroke-width="2" fill="none" marker-end="url(#sddArrowGo)"/>

  <!-- Step 4 → Step 5 -->
  <line x1="540" y1="402" x2="250" y2="402" stroke="#FBD000" stroke-width="2" marker-end="url(#sddArrowGo)"/>
  <text x="395" y="420" text-anchor="middle" font-size="8" fill="#D4A800">Results passed to reviewers</text>

  <!-- Step 5 → Step 6 -->
  <path d="M130,370 Q100,335 100,275" stroke="#E52521" stroke-width="2" fill="none" marker-end="url(#sddArrowR)"/>

  <!-- Step 6 → Step 1 (iterate) -->
  <path d="M100,210 Q100,160 135,125" stroke="#E52521" stroke-width="2" fill="none" marker-end="url(#sddArrowR)" stroke-dasharray="5,3"/>
  <text x="75" y="165" text-anchor="middle" font-size="8" fill="#E52521">iterate</text>

  <!-- Additional annotations -->
  <rect x="295" y="148" width="80" height="22" rx="4" fill="#049CD8" opacity="0.1" stroke="#049CD8" stroke-width="1"/>
  <text x="335" y="163" text-anchor="middle" font-size="8" font-weight="bold" fill="#049CD8">HUMAN</text>

  <rect x="490" y="175" width="80" height="22" rx="4" fill="#43B047" opacity="0.1" stroke="#43B047" stroke-width="1"/>
  <text x="530" y="190" text-anchor="middle" font-size="8" font-weight="bold" fill="#43B047">AI AGENT</text>

  <rect x="420" y="310" width="80" height="22" rx="4" fill="#FBD000" opacity="0.1" stroke="#FBD000" stroke-width="1"/>
  <text x="460" y="325" text-anchor="middle" font-size="8" font-weight="bold" fill="#D4A800">AUTOMATED</text>

  <rect x="215" y="310" width="80" height="22" rx="4" fill="#E52521" opacity="0.1" stroke="#E52521" stroke-width="1"/>
  <text x="255" y="325" text-anchor="middle" font-size="8" font-weight="bold" fill="#E52521">DECISION</text>

  <!-- Legend -->
  <rect x="215" y="458" width="370" height="35" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="1"/>
  <text x="235" y="480" font-size="10" font-weight="bold" fill="#333333">Legend:</text>
  <rect x="290" y="472" width="10" height="10" fill="#FFFFFF" stroke="#049CD8" stroke-width="2"/>
  <text x="305" y="481" font-size="9" fill="#333333">Spec</text>
  <rect x="335" y="472" width="10" height="10" fill="#FFFFFF" stroke="#43B047" stroke-width="2"/>
  <text x="350" y="481" font-size="9" fill="#333333">Execute</text>
  <rect x="395" y="472" width="10" height="10" fill="#FFFFFF" stroke="#FBD000" stroke-width="2"/>
  <text x="410" y="481" font-size="9" fill="#333333">Validate</text>
  <rect x="455" y="472" width="10" height="10" fill="#FFFFFF" stroke="#E52521" stroke-width="2"/>
  <text x="470" y="481" font-size="9" fill="#333333">Decide</text>
  <text x="510" y="481" font-size="9" fill="#666">| The SDD cycle</text>
</svg>