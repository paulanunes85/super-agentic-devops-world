<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="stepGrad0" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E52521;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#E52521;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="stepGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#049CD8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#049CD8;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="stepGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FBD000;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#FBD000;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="stepGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43B047;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#43B047;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="stepGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E52521;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#E52521;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333333">Niveis de Maturidade em IA</text>
  <text x="450" y="55" text-anchor="middle" font-size="13" fill="#666666">De Aprendiz a Lendario: A Evolucao do Heroi</text>

  <!-- Arrow line along the staircase -->
  <polyline points="90,430 230,430 230,350 380,350 380,270 530,270 530,190 680,190 680,110 820,110"
    fill="none" stroke="#CCCCCC" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Level 0 - No AI -->
  <rect x="50" y="370" width="170" height="80" rx="8" ry="8" fill="url(#stepGrad0)" stroke="#E52521" stroke-width="2"/>
  <rect x="50" y="370" width="170" height="24" rx="8" ry="0" fill="#E52521"/>
  <rect x="50" y="386" width="170" height="0.5" fill="#E52521"/>
  <text x="135" y="386" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Nivel 0 - Sem IA</text>
  <text x="135" y="410" text-anchor="middle" font-size="10" fill="#333333">Desenvolvimento 100% manual</text>
  <text x="135" y="424" text-anchor="middle" font-size="10" fill="#333333">Lutando com maos nuas</text>
  <text x="135" y="440" text-anchor="middle" font-size="9" fill="#999999">Sem Copilot, sem automacao</text>

  <!-- Level 1 - AI-Assisted -->
  <rect x="200" y="290" width="170" height="80" rx="8" ry="8" fill="url(#stepGrad1)" stroke="#049CD8" stroke-width="2"/>
  <rect x="200" y="290" width="170" height="24" rx="8" ry="0" fill="#049CD8"/>
  <rect x="200" y="306" width="170" height="0.5" fill="#049CD8"/>
  <text x="285" y="306" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Nivel 1 - AI-Assisted</text>
  <text x="285" y="330" text-anchor="middle" font-size="10" fill="#333333">IA sugere, humano decide</text>
  <text x="285" y="344" text-anchor="middle" font-size="10" fill="#333333">Espada + Manual de Dicas</text>
  <text x="285" y="358" text-anchor="middle" font-size="9" fill="#999999">Copilot Completions, Chat</text>

  <!-- Level 2 - AI-Infused -->
  <rect x="350" y="210" width="170" height="80" rx="8" ry="8" fill="url(#stepGrad2)" stroke="#FBD000" stroke-width="2"/>
  <rect x="350" y="210" width="170" height="24" rx="8" ry="0" fill="#FBD000"/>
  <rect x="350" y="226" width="170" height="0.5" fill="#FBD000"/>
  <text x="435" y="226" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">Nivel 2 - AI-Infused</text>
  <text x="435" y="250" text-anchor="middle" font-size="10" fill="#333333">IA integrada no fluxo</text>
  <text x="435" y="264" text-anchor="middle" font-size="10" fill="#333333">Espada Encantada</text>
  <text x="435" y="278" text-anchor="middle" font-size="9" fill="#999999">Testes, Review, Seguranca auto</text>

  <!-- Level 3 - AI-Native -->
  <rect x="500" y="130" width="170" height="80" rx="8" ry="8" fill="url(#stepGrad3)" stroke="#43B047" stroke-width="2"/>
  <rect x="500" y="130" width="170" height="24" rx="8" ry="0" fill="#43B047"/>
  <rect x="500" y="146" width="170" height="0.5" fill="#43B047"/>
  <text x="585" y="146" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Nivel 3 - AI-Native</text>
  <text x="585" y="170" text-anchor="middle" font-size="10" fill="#333333">Desenvolvimento PARA IA</text>
  <text x="585" y="184" text-anchor="middle" font-size="10" fill="#333333">Companion Autonomo</text>
  <text x="585" y="198" text-anchor="middle" font-size="9" fill="#999999">Spec-Driven, Coding Agents</text>

  <!-- Level 4 - AI-Autonomous -->
  <rect x="660" y="68" width="190" height="80" rx="8" ry="8" fill="url(#stepGrad4)" stroke="#E52521" stroke-width="2"/>
  <rect x="660" y="68" width="190" height="24" rx="8" ry="0" fill="#E52521"/>
  <rect x="660" y="84" width="190" height="0.5" fill="#E52521"/>
  <text x="755" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Nivel 4 - AI-Autonomous</text>
  <text x="755" y="108" text-anchor="middle" font-size="10" fill="#333333">Exercito de agentes coordenados</text>
  <text x="755" y="122" text-anchor="middle" font-size="10" fill="#333333">Humano como Estrategista</text>
  <text x="755" y="136" text-anchor="middle" font-size="9" fill="#999999">Multi-agent, Auto-recuperacao</text>

  <!-- Vertical connectors between steps -->
  <line x1="220" y1="370" x2="220" y2="370" stroke="#049CD8" stroke-width="2"/>
  <path d="M 190,370 L 230,370 L 230,350" fill="none" stroke="#049CD8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <path d="M 340,290 L 380,290 L 380,270" fill="none" stroke="#FBD000" stroke-width="2"/>
  <path d="M 490,210 L 530,210 L 530,190" fill="none" stroke="#43B047" stroke-width="2"/>
  <path d="M 640,130 L 690,130 L 690,128" fill="none" stroke="#E52521" stroke-width="2"/>

  <!-- Timeline arrow at bottom -->
  <line x1="60" y1="475" x2="840" y2="475" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
  </defs>

  <!-- Timeline labels -->
  <text x="135" y="495" text-anchor="middle" font-size="10" fill="#666666">1-2 semanas</text>
  <text x="285" y="495" text-anchor="middle" font-size="10" fill="#666666">1-3 meses</text>
  <text x="435" y="495" text-anchor="middle" font-size="10" fill="#666666">3-6 meses</text>
  <text x="585" y="495" text-anchor="middle" font-size="10" fill="#666666">6-12 meses</text>
  <text x="755" y="495" text-anchor="middle" font-size="10" fill="#666666">Transformacional</text>
  <text x="450" y="515" text-anchor="middle" font-size="11" fill="#999999">Tempo de Evolucao entre Niveis</text>

  <!-- Legend -->
  <rect x="30" y="68" width="10" height="10" rx="2" fill="#E52521"/>
  <text x="45" y="77" font-size="9" fill="#666666">Mario / Autonomo</text>
  <rect x="30" y="84" width="10" height="10" rx="2" fill="#049CD8"/>
  <text x="45" y="93" font-size="9" fill="#666666">Assistido</text>
  <rect x="30" y="100" width="10" height="10" rx="2" fill="#FBD000"/>
  <text x="45" y="109" font-size="9" fill="#666666">Integrado</text>
  <rect x="30" y="116" width="10" height="10" rx="2" fill="#43B047"/>
  <text x="45" y="125" font-size="9" fill="#666666">Nativo</text>
</svg>