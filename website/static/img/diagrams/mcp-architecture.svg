<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <rect width="800" height="500" fill="#FAFAFA" rx="8"/>
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333333">Model Context Protocol (MCP) Architecture</text>

  <defs>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#049CD8"/>
    </marker>
    <marker id="arrowBr" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#049CD8"/>
    </marker>
    <marker id="arrowGo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#FBD000"/>
    </marker>
    <marker id="arrowGor" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#FBD000"/>
    </marker>
    <marker id="arrowGn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#43B047"/>
    </marker>
    <marker id="arrowGnr" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#43B047"/>
    </marker>
  </defs>

  <!-- MCP Client (left) -->
  <rect x="30" y="70" width="220" height="310" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
  <rect x="30" y="70" width="220" height="40" rx="8" fill="#049CD8"/>
  <rect x="30" y="95" width="220" height="15" fill="#049CD8"/>
  <text x="140" y="95" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">MCP Client</text>
  <text x="140" y="130" text-anchor="middle" font-size="12" fill="#333333">Your AI Agent</text>

  <!-- Agent internals -->
  <rect x="55" y="148" width="170" height="40" rx="6" fill="#FFFFFF" stroke="#049CD8" stroke-width="1.5"/>
  <text x="140" y="172" text-anchor="middle" font-size="11" fill="#333333">LLM (GPT-4o / Claude)</text>

  <rect x="55" y="200" width="170" height="35" rx="6" fill="#FFFFFF" stroke="#049CD8" stroke-width="1.5"/>
  <text x="140" y="222" text-anchor="middle" font-size="11" fill="#333333">Tool Router</text>

  <rect x="55" y="248" width="170" height="35" rx="6" fill="#FFFFFF" stroke="#049CD8" stroke-width="1.5"/>
  <text x="140" y="270" text-anchor="middle" font-size="11" fill="#333333">Context Manager</text>

  <rect x="55" y="296" width="170" height="35" rx="6" fill="#FFFFFF" stroke="#049CD8" stroke-width="1.5"/>
  <text x="140" y="318" text-anchor="middle" font-size="11" fill="#333333">MCP Client SDK</text>

  <!-- Arrows between internal components -->
  <line x1="140" y1="188" x2="140" y2="200" stroke="#049CD8" stroke-width="1"/>
  <line x1="140" y1="235" x2="140" y2="248" stroke="#049CD8" stroke-width="1"/>
  <line x1="140" y1="283" x2="140" y2="296" stroke="#049CD8" stroke-width="1"/>

  <!-- MCP Protocol (middle bridge) -->
  <rect x="300" y="140" width="180" height="220" rx="8" fill="#FFFFFF" stroke="#FBD000" stroke-width="2.5"/>
  <rect x="300" y="140" width="180" height="38" rx="8" fill="#FBD000"/>
  <rect x="300" y="163" width="180" height="15" fill="#FBD000"/>
  <text x="390" y="165" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">MCP Protocol</text>

  <text x="390" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">Capabilities</text>

  <rect x="320" y="210" width="140" height="28" rx="5" fill="#FFFFFF" stroke="#FBD000" stroke-width="1.5"/>
  <text x="390" y="229" text-anchor="middle" font-size="10" fill="#333333">Tools (actions to execute)</text>

  <rect x="320" y="248" width="140" height="28" rx="5" fill="#FFFFFF" stroke="#FBD000" stroke-width="1.5"/>
  <text x="390" y="267" text-anchor="middle" font-size="10" fill="#333333">Resources (data to read)</text>

  <rect x="320" y="286" width="140" height="28" rx="5" fill="#FFFFFF" stroke="#FBD000" stroke-width="1.5"/>
  <text x="390" y="305" text-anchor="middle" font-size="10" fill="#333333">Prompts (templates)</text>

  <rect x="320" y="324" width="140" height="28" rx="5" fill="#FFFFFF" stroke="#FBD000" stroke-width="1.5"/>
  <text x="390" y="343" text-anchor="middle" font-size="10" fill="#333333">JSON-RPC / stdio</text>

  <!-- Client ↔ Protocol arrows -->
  <line x1="250" y1="240" x2="300" y2="240" stroke="#049CD8" stroke-width="2" marker-end="url(#arrowGo)"/>
  <line x1="300" y1="260" x2="250" y2="260" stroke="#FBD000" stroke-width="2" marker-end="url(#arrowBr)"/>
  <text x="275" y="232" text-anchor="middle" font-size="8" fill="#666">request</text>
  <text x="275" y="276" text-anchor="middle" font-size="8" fill="#666">response</text>

  <!-- MCP Servers (right) -->
  <rect x="540" y="75" width="230" height="72" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2"/>
  <text x="580" y="100" font-size="12" font-weight="bold" fill="#333333">Figma Server</text>
  <text x="580" y="118" font-size="9" fill="#666">get_design, get_screenshot</text>
  <text x="750" y="107" text-anchor="middle" font-size="20" fill="#43B047">&#9733;</text>

  <rect x="540" y="160" width="230" height="72" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2"/>
  <text x="580" y="185" font-size="12" font-weight="bold" fill="#333333">PostgreSQL Server</text>
  <text x="580" y="203" font-size="9" fill="#666">query, list_tables, describe</text>
  <text x="750" y="192" text-anchor="middle" font-size="20" fill="#43B047">&#9735;</text>

  <rect x="540" y="245" width="230" height="72" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2"/>
  <text x="580" y="270" font-size="12" font-weight="bold" fill="#333333">GitHub Server</text>
  <text x="580" y="288" font-size="9" fill="#666">create_pr, search_issues</text>
  <text x="750" y="277" text-anchor="middle" font-size="20" fill="#43B047">&#9737;</text>

  <rect x="540" y="330" width="230" height="72" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2"/>
  <text x="580" y="355" font-size="12" font-weight="bold" fill="#333333">Slack Server</text>
  <text x="580" y="373" font-size="9" fill="#666">send_message, list_channels</text>
  <text x="750" y="362" text-anchor="middle" font-size="20" fill="#43B047">&#9993;</text>

  <!-- Protocol ↔ Servers arrows -->
  <line x1="480" y1="200" x2="540" y2="111" stroke="#43B047" stroke-width="1.5" marker-end="url(#arrowGn)"/>
  <line x1="480" y1="230" x2="540" y2="196" stroke="#43B047" stroke-width="1.5" marker-end="url(#arrowGn)"/>
  <line x1="480" y1="270" x2="540" y2="281" stroke="#43B047" stroke-width="1.5" marker-end="url(#arrowGn)"/>
  <line x1="480" y1="300" x2="540" y2="366" stroke="#43B047" stroke-width="1.5" marker-end="url(#arrowGn)"/>

  <!-- Legend -->
  <rect x="30" y="430" width="500" height="55" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="1"/>
  <text x="50" y="452" font-size="11" font-weight="bold" fill="#333333">Legend</text>
  <rect x="50" y="462" width="12" height="12" fill="#FFFFFF" stroke="#049CD8" stroke-width="2"/>
  <text x="67" y="473" font-size="10" fill="#333333">Client (Agent)</text>
  <rect x="165" y="462" width="12" height="12" fill="#FFFFFF" stroke="#FBD000" stroke-width="2"/>
  <text x="182" y="473" font-size="10" fill="#333333">MCP Protocol</text>
  <rect x="290" y="462" width="12" height="12" fill="#FFFFFF" stroke="#43B047" stroke-width="2"/>
  <text x="307" y="473" font-size="10" fill="#333333">MCP Servers</text>
  <text x="400" y="473" font-size="10" fill="#666">|  MCP connects agents to external tools via a standard protocol</text>
</svg>