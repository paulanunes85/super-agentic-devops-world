<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <rect width="800" height="500" fill="#FAFAFA" rx="8"/>
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333333">4 Channels of Agent Operation</text>

  <defs>
    <marker id="arrowFlow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999"/>
    </marker>
  </defs>

  <!-- Channel 1: IDE (blue) -->
  <rect x="30" y="60" width="165" height="320" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
  <rect x="30" y="60" width="165" height="40" rx="8" fill="#049CD8"/>
  <rect x="30" y="85" width="165" height="15" fill="#049CD8"/>
  <text x="112" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">IDE</text>
  <!-- VS Code icon -->
  <rect x="87" y="120" width="50" height="40" rx="4" fill="#FFFFFF" stroke="#049CD8" stroke-width="1.5"/>
  <text x="112" y="143" text-anchor="middle" font-size="16" fill="#049CD8">{ }</text>
  <text x="112" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">VS Code</text>
  <text x="112" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">Copilot</text>
  <line x1="60" y1="215" x2="165" y2="215" stroke="#049CD8" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="112" y="235" text-anchor="middle" font-size="10" fill="#333333">Real-time</text>
  <text x="112" y="250" text-anchor="middle" font-size="10" fill="#333333">Interactive</text>
  <text x="112" y="265" text-anchor="middle" font-size="10" fill="#333333">Code-focused</text>
  <line x1="60" y1="280" x2="165" y2="280" stroke="#049CD8" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="112" y="300" text-anchor="middle" font-size="9" fill="#666">Completions</text>
  <text x="112" y="314" text-anchor="middle" font-size="9" fill="#666">Inline chat</text>
  <text x="112" y="328" text-anchor="middle" font-size="9" fill="#666">Agent mode</text>
  <text x="112" y="342" text-anchor="middle" font-size="9" fill="#666">Multi-file edits</text>
  <text x="112" y="365" text-anchor="middle" font-size="16" fill="#049CD8">&#9998;</text>

  <!-- Channel 2: Chat Portal (green) -->
  <rect x="215" y="60" width="165" height="320" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2.5"/>
  <rect x="215" y="60" width="165" height="40" rx="8" fill="#43B047"/>
  <rect x="215" y="85" width="165" height="15" fill="#43B047"/>
  <text x="297" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Chat Portal</text>
  <!-- Web icon -->
  <circle cx="297" cy="138" r="20" fill="#FFFFFF" stroke="#43B047" stroke-width="1.5"/>
  <ellipse cx="297" cy="138" rx="8" ry="20" fill="none" stroke="#43B047" stroke-width="1"/>
  <line x1="277" y1="138" x2="317" y2="138" stroke="#43B047" stroke-width="1"/>
  <text x="297" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">Web UI</text>
  <text x="297" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">Copilot Chat</text>
  <line x1="245" y1="215" x2="350" y2="215" stroke="#43B047" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="297" y="235" text-anchor="middle" font-size="10" fill="#333333">On-demand</text>
  <text x="297" y="250" text-anchor="middle" font-size="10" fill="#333333">Self-service</text>
  <text x="297" y="265" text-anchor="middle" font-size="10" fill="#333333">Conversational</text>
  <line x1="245" y1="280" x2="350" y2="280" stroke="#43B047" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="297" y="300" text-anchor="middle" font-size="9" fill="#666">Knowledge Q&amp;A</text>
  <text x="297" y="314" text-anchor="middle" font-size="9" fill="#666">Troubleshooting</text>
  <text x="297" y="328" text-anchor="middle" font-size="9" fill="#666">Documentation</text>
  <text x="297" y="342" text-anchor="middle" font-size="9" fill="#666">Exploration</text>
  <text x="297" y="365" text-anchor="middle" font-size="16" fill="#43B047">&#128172;</text>

  <!-- Channel 3: ChatOps (gold) -->
  <rect x="400" y="60" width="165" height="320" rx="8" fill="#FFFFFF" stroke="#FBD000" stroke-width="2.5"/>
  <rect x="400" y="60" width="165" height="40" rx="8" fill="#FBD000"/>
  <rect x="400" y="85" width="165" height="15" fill="#FBD000"/>
  <text x="482" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">ChatOps</text>
  <!-- GitHub icon -->
  <circle cx="482" cy="138" r="20" fill="#FFFFFF" stroke="#D4A800" stroke-width="1.5"/>
  <text x="482" y="144" text-anchor="middle" font-size="14" fill="#333333">GH</text>
  <text x="482" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">GitHub Issues</text>
  <text x="482" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">&amp; PR Comments</text>
  <line x1="430" y1="215" x2="535" y2="215" stroke="#FBD000" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="482" y="235" text-anchor="middle" font-size="10" fill="#333333">Event-driven</text>
  <text x="482" y="250" text-anchor="middle" font-size="10" fill="#333333">Asynchronous</text>
  <text x="482" y="265" text-anchor="middle" font-size="10" fill="#333333">Collaborative</text>
  <line x1="430" y1="280" x2="535" y2="280" stroke="#FBD000" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="482" y="300" text-anchor="middle" font-size="9" fill="#666">PR reviews</text>
  <text x="482" y="314" text-anchor="middle" font-size="9" fill="#666">Issue triage</text>
  <text x="482" y="328" text-anchor="middle" font-size="9" fill="#666">Coding agent</text>
  <text x="482" y="342" text-anchor="middle" font-size="9" fill="#666">@copilot mentions</text>
  <text x="482" y="365" text-anchor="middle" font-size="16" fill="#D4A800">&#9889;</text>

  <!-- Channel 4: Background (red) -->
  <rect x="585" y="60" width="185" height="320" rx="8" fill="#FFFFFF" stroke="#E52521" stroke-width="2.5"/>
  <rect x="585" y="60" width="185" height="40" rx="8" fill="#E52521"/>
  <rect x="585" y="85" width="185" height="15" fill="#E52521"/>
  <text x="677" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Background</text>
  <!-- Cloud icon -->
  <ellipse cx="677" cy="132" rx="25" ry="15" fill="#FFFFFF" stroke="#E52521" stroke-width="1.5"/>
  <ellipse cx="663" cy="138" rx="12" ry="10" fill="#FFFFFF" stroke="#E52521" stroke-width="1"/>
  <ellipse cx="691" cy="138" rx="12" ry="10" fill="#FFFFFF" stroke="#E52521" stroke-width="1"/>
  <text x="677" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">GitHub Actions</text>
  <text x="677" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">Scheduled Jobs</text>
  <line x1="615" y1="215" x2="740" y2="215" stroke="#E52521" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="677" y="235" text-anchor="middle" font-size="10" fill="#333333">Autonomous</text>
  <text x="677" y="250" text-anchor="middle" font-size="10" fill="#333333">Scheduled</text>
  <text x="677" y="265" text-anchor="middle" font-size="10" fill="#333333">Continuous</text>
  <line x1="615" y1="280" x2="740" y2="280" stroke="#E52521" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="677" y="300" text-anchor="middle" font-size="9" fill="#666">Security scans</text>
  <text x="677" y="314" text-anchor="middle" font-size="9" fill="#666">Dependency updates</text>
  <text x="677" y="328" text-anchor="middle" font-size="9" fill="#666">Code migration</text>
  <text x="677" y="342" text-anchor="middle" font-size="9" fill="#666">Autofix workflows</text>
  <text x="677" y="365" text-anchor="middle" font-size="16" fill="#E52521">&#9881;</text>

  <!-- Connecting lines between channels -->
  <line x1="195" y1="400" x2="215" y2="400" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="380" y1="400" x2="400" y2="400" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="565" y1="400" x2="585" y2="400" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Data flow label -->
  <text x="400" y="415" text-anchor="middle" font-size="9" fill="#999">Shared context and data flow between channels</text>

  <!-- Legend -->
  <rect x="170" y="440" width="460" height="50" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="1"/>
  <text x="195" y="460" font-size="11" font-weight="bold" fill="#333333">Legend:</text>
  <text x="195" y="478" font-size="10" fill="#333333">4 channels where AI agents operate — each suited for different workflows and interaction patterns</text>
  <rect x="530" y="452" width="10" height="10" fill="#049CD8"/>
  <text x="544" y="462" font-size="9" fill="#333333">IDE</text>
  <rect x="565" y="452" width="10" height="10" fill="#43B047"/>
  <text x="579" y="462" font-size="9" fill="#333333">Chat</text>
  <rect x="600" y="452" width="10" height="10" fill="#FBD000"/>
  <text x="614" y="462" font-size="9" fill="#333333">Ops</text>
  <rect x="635" y="452" width="10" height="10" fill="#E52521"/>
  <text x="649" y="462" font-size="9" fill="#333333">BG</text>
</svg>