<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, sans-serif">
  <defs>
    <marker id="gw-arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43B047"/>
    </marker>
    <marker id="gw-arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#049CD8"/>
    </marker>
    <filter id="gw-shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#FAFAFA" rx="4"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#333333">Git Save Game System — How Code Flows</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#666666">From your editor to the cloud, step by step</text>

  <!-- Main flow boxes -->
  <!-- Working Directory -->
  <g filter="url(#gw-shadow)">
    <rect x="40" y="100" width="170" height="80" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
    <text x="125" y="133" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Working</text>
    <text x="125" y="152" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Directory</text>
    <text x="125" y="172" text-anchor="middle" font-size="10" fill="#666666">Your local files</text>
  </g>

  <!-- Arrow: git add -->
  <line x1="210" y1="140" x2="268" y2="140" stroke="#43B047" stroke-width="2.5" marker-end="url(#gw-arrow)"/>
  <rect x="218" y="118" width="60" height="20" rx="4" fill="#43B047" opacity="0.12"/>
  <text x="248" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#43B047">git add</text>

  <!-- Staging Area -->
  <g filter="url(#gw-shadow)">
    <rect x="278" y="100" width="170" height="80" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
    <text x="363" y="133" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Staging</text>
    <text x="363" y="152" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Area</text>
    <text x="363" y="172" text-anchor="middle" font-size="10" fill="#666666">Ready to save</text>
  </g>

  <!-- Arrow: git commit -->
  <line x1="448" y1="140" x2="508" y2="140" stroke="#43B047" stroke-width="2.5" marker-end="url(#gw-arrow)"/>
  <rect x="448" y="118" width="74" height="20" rx="4" fill="#43B047" opacity="0.12"/>
  <text x="485" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#43B047">git commit</text>

  <!-- Local Repository -->
  <g filter="url(#gw-shadow)">
    <rect x="518" y="100" width="170" height="80" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
    <text x="603" y="133" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Local</text>
    <text x="603" y="152" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Repository</text>
    <text x="603" y="172" text-anchor="middle" font-size="10" fill="#666666">Saved snapshots</text>
  </g>

  <!-- Arrow: git push -->
  <line x1="688" y1="140" x2="748" y2="140" stroke="#43B047" stroke-width="2.5" marker-end="url(#gw-arrow)"/>
  <rect x="694" y="118" width="66" height="20" rx="4" fill="#43B047" opacity="0.12"/>
  <text x="727" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#43B047">git push</text>

  <!-- Remote Repository -->
  <g filter="url(#gw-shadow)">
    <rect x="758" y="100" width="120" height="80" rx="8" fill="#FFFFFF" stroke="#E52521" stroke-width="2.5"/>
    <text x="818" y="133" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Remote</text>
    <text x="818" y="152" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Repository</text>
    <text x="818" y="172" text-anchor="middle" font-size="10" fill="#666666">GitHub / cloud</text>
  </g>

  <!-- Reverse arrows -->
  <line x1="758" y1="190" x2="698" y2="190" stroke="#049CD8" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#gw-arrow-blue)"/>
  <text x="727" y="208" text-anchor="middle" font-size="10" fill="#049CD8">git pull / fetch</text>

  <line x1="518" y1="190" x2="458" y2="190" stroke="#049CD8" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#gw-arrow-blue)"/>
  <text x="488" y="208" text-anchor="middle" font-size="10" fill="#049CD8">git checkout</text>

  <!-- Divider -->
  <line x1="40" y1="240" x2="860" y2="240" stroke="#E0E0E0" stroke-width="1"/>
  <text x="450" y="265" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Branching &amp; Merging Flow</text>

  <!-- Branch diagram -->
  <!-- Main branch line -->
  <circle cx="100" cy="310" r="10" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
  <text x="100" y="314" text-anchor="middle" font-size="9" font-weight="bold" fill="#049CD8">M</text>
  <line x1="110" y1="310" x2="240" y2="310" stroke="#049CD8" stroke-width="2.5"/>

  <circle cx="250" cy="310" r="10" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
  <text x="250" y="314" text-anchor="middle" font-size="9" font-weight="bold" fill="#049CD8">M</text>
  <line x1="260" y1="310" x2="540" y2="310" stroke="#049CD8" stroke-width="2.5"/>

  <circle cx="550" cy="310" r="10" fill="#FFFFFF" stroke="#FBD000" stroke-width="2.5"/>
  <text x="550" y="314" text-anchor="middle" font-size="9" font-weight="bold" fill="#B89A00">M</text>
  <text x="550" y="340" text-anchor="middle" font-size="10" fill="#666666">merge commit</text>
  <line x1="560" y1="310" x2="700" y2="310" stroke="#049CD8" stroke-width="2.5"/>

  <circle cx="710" cy="310" r="10" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
  <text x="710" y="314" text-anchor="middle" font-size="9" font-weight="bold" fill="#049CD8">M</text>

  <text x="100" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#049CD8">main</text>

  <!-- Feature branch -->
  <line x1="250" y1="310" x2="310" y2="375" stroke="#43B047" stroke-width="2"/>
  <circle cx="320" cy="380" r="10" fill="#FFFFFF" stroke="#43B047" stroke-width="2.5"/>
  <text x="320" y="384" text-anchor="middle" font-size="9" font-weight="bold" fill="#43B047">F</text>
  <line x1="330" y1="380" x2="390" y2="380" stroke="#43B047" stroke-width="2"/>

  <circle cx="400" cy="380" r="10" fill="#FFFFFF" stroke="#43B047" stroke-width="2.5"/>
  <text x="400" y="384" text-anchor="middle" font-size="9" font-weight="bold" fill="#43B047">F</text>
  <line x1="410" y1="380" x2="470" y2="380" stroke="#43B047" stroke-width="2"/>

  <circle cx="480" cy="380" r="10" fill="#FFFFFF" stroke="#43B047" stroke-width="2.5"/>
  <text x="480" y="384" text-anchor="middle" font-size="9" font-weight="bold" fill="#43B047">F</text>

  <text x="400" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="#43B047">feature-branch</text>

  <!-- Merge line back -->
  <line x1="480" y1="375" x2="545" y2="315" stroke="#43B047" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Labels -->
  <text x="270" y="360" font-size="10" fill="#43B047">git checkout -b</text>
  <text x="500" y="350" font-size="10" fill="#43B047">git merge</text>

  <!-- Legend -->
  <g>
    <rect x="40" y="440" width="830" height="65" rx="8" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
    <text x="60" y="462" font-size="13" font-weight="bold" fill="#333333">Legend</text>

    <rect x="120" y="451" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#049CD8" stroke-width="2"/>
    <text x="142" y="463" font-size="11" fill="#333333">Git areas / main branch</text>

    <rect x="310" y="451" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#E52521" stroke-width="2"/>
    <text x="332" y="463" font-size="11" fill="#333333">Remote (cloud)</text>

    <line x1="460" y1="459" x2="490" y2="459" stroke="#43B047" stroke-width="2.5" marker-end="url(#gw-arrow)"/>
    <text x="498" y="463" font-size="11" fill="#333333">Forward commands (add, commit, push)</text>

    <line x1="700" y1="459" x2="730" y2="459" stroke="#049CD8" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#gw-arrow-blue)"/>
    <text x="738" y="463" font-size="11" fill="#333333">Reverse commands</text>

    <rect x="120" y="475" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#FBD000" stroke-width="2"/>
    <text x="142" y="487" font-size="11" fill="#333333">Merge commits</text>

    <rect x="310" y="475" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#43B047" stroke-width="2"/>
    <text x="332" y="487" font-size="11" fill="#333333">Feature branch</text>
  </g>
</svg>