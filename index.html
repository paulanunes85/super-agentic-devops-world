<script type="text/babel" src="components-interactive.jsx"></script>
<script type="text/babel" src="components-gamification.jsx"></script>
<script type="text/babel" src="components-navigation.jsx"></script>
<script type="text/babel" src="companion.jsx"></script>
<script type="text/babel" src="screens-1.jsx"></script>
<script type="text/babel" src="screens-2.jsx"></script>
<script type="text/babel" src="screens-3.jsx"></script>
<script type="text/babel" src="screens-lesson-v2.jsx"></script>

<script type="text/babel">
function App() {
  const route = useRoute();
  const state = useAppState();
  const [showSearch, setShowSearch] = React.useState(false);
  const [showShortcuts, setShowShortcuts] = React.useState(false);
  const [showOnboarding, setShowOnboarding] = React.useState(false);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (showSearch || showShortcuts || showOnboarding) return;
      switch (e.key) {
        case '/': e.preventDefault(); setShowSearch(true); break;
        case '?': setShowShortcuts(true); break;
        case 'm': case 'M': navigateWithWarp('/map'); break;
        case 'p': case 'P': navigateWithWarp('/profile'); break;
        case 'n': case 'N':
          const quest = AppStore.getNextQuest();
          if (quest) navigateWithWarp('/lesson/' + quest.level.id);
          break;
        case '1': case '2': case '3': case '4':
        case '5': case '6': case '7': case '8':
          navigateWithWarp('/world/' + e.key);
          break;
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [showSearch, showShortcuts, showOnboarding]);

  React.useEffect(() => {
    if (route === '/map' && !state.progress.onboardingDone) {
      setShowOnboarding(true);
    }
  }, [route]);

  let content;
  let currentWorldId = null;
  if (route === '/' || route === '') content = React.createElement(ScreenLanding);
  else if (route === '/login') content = React.createElement(ScreenLogin);
  else if (route === '/map') { content = React.createElement(ScreenMap); currentWorldId = 1; }
  else if (route.startsWith('/world/')) {
    const id = route.split('/')[2];
    content = React.createElement(ScreenWorld, { worldId: id });
    currentWorldId = parseInt(id, 10);
  }
  else if (route.startsWith('/lesson/')) {
    const id = route.split('/')[2];
    content = React.createElement(ScreenLesson, { lessonId: id });
    currentWorldId = parseInt(id.split('-')[0], 10);
  }
  else if (route === '/profile') content = React.createElement(ScreenProfile);
  else if (route === '/badges') content = React.createElement(ScreenBadges);
  else if (route === '/leaderboard') content = React.createElement(ScreenLeaderboard);
  else if (route === '/shop') content = React.createElement(ScreenShop);
  else if (route === '/glossary') content = React.createElement(ScreenGlossary);
  else content = React.createElement(ScreenLanding);

  const showHud = !(route === '/' || route === '' || route === '/login');

  React.useEffect(() => {
    document.body.className = currentWorldId ? 'biome-' + currentWorldId : '';
  }, [currentWorldId]);

  return (
    <div className="scanlines">
      <WarpOverlay/>
      {currentWorldId && <ParallaxBG worldId={currentWorldId}/>}
      {showHud && <HUD onSearch={() => setShowSearch(true)} onShortcuts={() => setShowShortcuts(true)}/>}
      <div style={{ position: 'relative', zIndex: 1 }}>
        {content}
      </div>
      {showSearch && <SearchOverlay onClose={() => setShowSearch(false)}/>}
      {showShortcuts && <ShortcutsHelp onClose={() => setShowShortcuts(false)}/>}
      {showOnboarding && <Onboarding onDone={() => setShowOnboarding(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
