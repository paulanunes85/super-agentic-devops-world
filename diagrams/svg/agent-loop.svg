<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="Arial, sans-serif">
  <defs>
    <filter id="al-shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="al-arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43B047"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="560" fill="#FAFAFA" rx="4"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#333333">The Agent Loop &mdash; Sense-Think-Act Cycle</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#666666">A continuous cycle that drives autonomous behavior</text>

  <!-- Center label -->
  <text x="400" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#999999">Continuous</text>
  <text x="400" y="266" text-anchor="middle" font-size="14" font-weight="bold" fill="#999999">Cycle</text>

  <!-- Circular arrow path (background ring) -->
  <circle cx="400" cy="255" r="150" fill="none" stroke="#E8E8E8" stroke-width="18" opacity="0.5"/>

  <!-- Curved arrow segments between nodes (drawn as arcs) -->
  <!-- Arc from Observe to Think -->
  <path d="M 472 130 A 150 150 0 0 1 545 205" fill="none" stroke="#43B047" stroke-width="3" marker-end="url(#al-arrow)"/>
  <!-- Arc from Think to Plan -->
  <path d="M 552 290 A 150 150 0 0 1 490 375" fill="none" stroke="#43B047" stroke-width="3" marker-end="url(#al-arrow)"/>
  <!-- Arc from Plan to Act -->
  <path d="M 380 395 A 150 150 0 0 1 290 360" fill="none" stroke="#43B047" stroke-width="3" marker-end="url(#al-arrow)"/>
  <!-- Arc from Act to Get Result -->
  <path d="M 258 290 A 150 150 0 0 1 260 195" fill="none" stroke="#43B047" stroke-width="3" marker-end="url(#al-arrow)"/>
  <!-- Arc from Get Result to Observe -->
  <path d="M 305 125 A 150 150 0 0 1 385 105" fill="none" stroke="#43B047" stroke-width="3" marker-end="url(#al-arrow)"/>

  <!-- Node 1: Observe (top center, 12 o'clock position) -->
  <g filter="url(#al-shadow)">
    <rect x="340" y="80" width="120" height="55" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
    <text x="400" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Observe</text>
    <text x="400" y="122" text-anchor="middle" font-size="10" fill="#666666">Gather context</text>
  </g>

  <!-- Node 2: Think (top right, ~2 o'clock) -->
  <g filter="url(#al-shadow)">
    <rect x="498" y="165" width="120" height="55" rx="8" fill="#FFFFFF" stroke="#E52521" stroke-width="2.5"/>
    <text x="558" y="189" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Think</text>
    <text x="558" y="207" text-anchor="middle" font-size="10" fill="#666666">Reason &amp; analyze</text>
  </g>

  <!-- Node 3: Plan (bottom right, ~4 o'clock) -->
  <g filter="url(#al-shadow)">
    <rect x="470" y="330" width="120" height="55" rx="8" fill="#FFFFFF" stroke="#FBD000" stroke-width="2.5"/>
    <text x="530" y="354" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Plan</text>
    <text x="530" y="372" text-anchor="middle" font-size="10" fill="#666666">Choose strategy</text>
  </g>

  <!-- Node 4: Act (bottom left, ~8 o'clock) -->
  <g filter="url(#al-shadow)">
    <rect x="210" y="330" width="120" height="55" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2.5"/>
    <text x="270" y="354" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Act</text>
    <text x="270" y="372" text-anchor="middle" font-size="10" fill="#666666">Execute tools</text>
  </g>

  <!-- Node 5: Get Result (top left, ~10 o'clock) -->
  <g filter="url(#al-shadow)">
    <rect x="182" y="165" width="120" height="55" rx="8" fill="#FFFFFF" stroke="#7B2D8E" stroke-width="2.5"/>
    <text x="242" y="186" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">Get Result</text>
    <text x="242" y="207" text-anchor="middle" font-size="10" fill="#666666">Evaluate outcome</text>
  </g>

  <!-- Step numbers -->
  <circle cx="345" cy="85" r="12" fill="#049CD8" opacity="0.15" stroke="#049CD8" stroke-width="1.5"/>
  <text x="345" y="89" text-anchor="middle" font-size="10" font-weight="bold" fill="#049CD8">1</text>

  <circle cx="503" cy="170" r="12" fill="#E52521" opacity="0.15" stroke="#E52521" stroke-width="1.5"/>
  <text x="503" y="174" text-anchor="middle" font-size="10" font-weight="bold" fill="#E52521">2</text>

  <circle cx="475" cy="335" r="12" fill="#FBD000" opacity="0.15" stroke="#B89A00" stroke-width="1.5"/>
  <text x="475" y="339" text-anchor="middle" font-size="10" font-weight="bold" fill="#B89A00">3</text>

  <circle cx="325" cy="335" r="12" fill="#43B047" opacity="0.15" stroke="#43B047" stroke-width="1.5"/>
  <text x="325" y="339" text-anchor="middle" font-size="10" font-weight="bold" fill="#43B047">4</text>

  <circle cx="187" cy="170" r="12" fill="#7B2D8E" opacity="0.15" stroke="#7B2D8E" stroke-width="1.5"/>
  <text x="187" y="174" text-anchor="middle" font-size="10" font-weight="bold" fill="#7B2D8E">5</text>

  <!-- Circular arrow icon in center -->
  <path d="M 388 245 A 18 18 0 1 1 388 265" fill="none" stroke="#CCCCCC" stroke-width="2"/>
  <polygon points="385,265 391,270 391,260" fill="#CCCCCC"/>

  <!-- Legend -->
  <g>
    <rect x="30" y="425" width="740" height="120" rx="8" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
    <text x="50" y="450" font-size="13" font-weight="bold" fill="#333333">Legend &mdash; The Agent Loop (Continuous Cycle)</text>

    <circle cx="62" cy="472" r="8" fill="#049CD8" opacity="0.15" stroke="#049CD8" stroke-width="1.5"/>
    <text x="62" y="476" text-anchor="middle" font-size="9" font-weight="bold" fill="#049CD8">1</text>
    <text x="78" y="476" font-size="11" fill="#333333">Observe &mdash; Read environment, files, user input</text>

    <circle cx="62" cy="496" r="8" fill="#E52521" opacity="0.15" stroke="#E52521" stroke-width="1.5"/>
    <text x="62" y="500" text-anchor="middle" font-size="9" font-weight="bold" fill="#E52521">2</text>
    <text x="78" y="500" font-size="11" fill="#333333">Think &mdash; LLM reasoning about what to do</text>

    <circle cx="62" cy="520" r="8" fill="#FBD000" opacity="0.15" stroke="#B89A00" stroke-width="1.5"/>
    <text x="62" y="524" text-anchor="middle" font-size="9" font-weight="bold" fill="#B89A00">3</text>
    <text x="78" y="524" font-size="11" fill="#333333">Plan &mdash; Select tools and approach</text>

    <circle cx="420" cy="472" r="8" fill="#43B047" opacity="0.15" stroke="#43B047" stroke-width="1.5"/>
    <text x="420" y="476" text-anchor="middle" font-size="9" font-weight="bold" fill="#43B047">4</text>
    <text x="436" y="476" font-size="11" fill="#333333">Act &mdash; Execute commands, write code, call APIs</text>

    <circle cx="420" cy="496" r="8" fill="#7B2D8E" opacity="0.15" stroke="#7B2D8E" stroke-width="1.5"/>
    <text x="420" y="500" text-anchor="middle" font-size="9" font-weight="bold" fill="#7B2D8E">5</text>
    <text x="436" y="500" font-size="11" fill="#333333">Get Result &mdash; Evaluate output, check for errors</text>

    <line x1="420" y1="520" x2="450" y2="520" stroke="#43B047" stroke-width="2.5" marker-end="url(#al-arrow)"/>
    <text x="458" y="524" font-size="11" fill="#333333">Flow direction &mdash; cycle repeats until goal is met</text>
  </g>
</svg>