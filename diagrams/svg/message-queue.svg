<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300">
  <style>
    text { font-family: Arial, sans-serif; fill: #333333; }
  </style>

  <defs>
    <marker id="arrMQ" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="18" font-weight="bold">Async Message Queue Pattern</text>

  <!-- === Producer (Mario) - Blue === -->
  <rect x="30" y="90" width="120" height="80" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
  <text x="90" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#049CD8">Producer</text>
  <text x="90" y="140" text-anchor="middle" font-size="20">🍄</text>
  <text x="90" y="162" text-anchor="middle" font-size="10">(Mario)</text>

  <!-- Arrow Producer → Queue -->
  <line x1="150" y1="130" x2="210" y2="130" stroke="#049CD8" stroke-width="2" marker-end="url(#arrMQ)"/>
  <text x="180" y="120" text-anchor="middle" font-size="8" fill="#999">send</text>

  <!-- === Message Queue (Gold) === -->
  <rect x="215" y="70" width="220" height="120" rx="8" fill="#FFFFFF" stroke="#FBD000" stroke-width="2.5"/>
  <text x="325" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#B8960A">Message Queue</text>

  <!-- Messages inside the queue -->
  <rect x="230" y="105" width="40" height="25" rx="3" fill="#FFF8E0" stroke="#FBD000" stroke-width="1"/>
  <text x="250" y="122" text-anchor="middle" font-size="9">msg1</text>

  <rect x="278" y="105" width="40" height="25" rx="3" fill="#FFF8E0" stroke="#FBD000" stroke-width="1"/>
  <text x="298" y="122" text-anchor="middle" font-size="9">msg2</text>

  <rect x="326" y="105" width="40" height="25" rx="3" fill="#FFF8E0" stroke="#FBD000" stroke-width="1"/>
  <text x="346" y="122" text-anchor="middle" font-size="9">msg3</text>

  <rect x="374" y="105" width="40" height="25" rx="3" fill="#FFF8E0" stroke="#FBD000" stroke-width="1"/>
  <text x="394" y="122" text-anchor="middle" font-size="9">msg4</text>

  <!-- Queue flow arrows inside -->
  <text x="260" y="155" font-size="10" fill="#999">→</text>
  <text x="305" y="155" font-size="10" fill="#999">→</text>
  <text x="350" y="155" font-size="10" fill="#999">→</text>
  <text x="395" y="155" font-size="10" fill="#999">→</text>
  <text x="325" y="175" text-anchor="middle" font-size="9" fill="#999">FIFO order</text>

  <!-- Arrow Queue → Consumer 1 -->
  <line x1="435" y1="110" x2="500" y2="90" stroke="#43B047" stroke-width="2" marker-end="url(#arrMQ)"/>
  <text x="475" y="95" text-anchor="middle" font-size="8" fill="#999">consume</text>

  <!-- Arrow Queue → Consumer 2 -->
  <line x1="435" y1="150" x2="500" y2="170" stroke="#43B047" stroke-width="2" marker-end="url(#arrMQ)"/>
  <text x="475" y="168" text-anchor="middle" font-size="8" fill="#999">consume</text>

  <!-- === Consumer 1 (Toad A) - Green === -->
  <rect x="505" y="55" width="130" height="70" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2.5"/>
  <text x="570" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#43B047">Consumer 1</text>
  <text x="570" y="100" text-anchor="middle" font-size="10">Toad A 🟢</text>
  <text x="570" y="115" text-anchor="middle" font-size="9">Process orders</text>

  <!-- === Consumer 2 (Toad B) - Green === -->
  <rect x="505" y="145" width="130" height="70" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2.5"/>
  <text x="570" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="#43B047">Consumer 2</text>
  <text x="570" y="190" text-anchor="middle" font-size="10">Toad B 🟢</text>
  <text x="570" y="205" text-anchor="middle" font-size="9">Send emails</text>

  <!-- Legend -->
  <rect x="30" y="250" width="260" height="30" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="1"/>
  <text x="160" y="270" text-anchor="middle" font-size="11">Legend: Async message queue pattern</text>
</svg>