<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" font-family="Arial, Helvetica, sans-serif">

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333333">Microsoft Agentic Framework</text>
  <text x="430" y="50" text-anchor="middle" font-size="13" fill="#666666">O Ecossistema em Camadas para Construir Agentes de IA</text>

  <!-- ==================== LAYER 5 (top): Applications ==================== -->
  <rect x="80" y="72" width="700" height="60" rx="8" ry="8" fill="white" stroke="#E52521" stroke-width="2"/>
  <text x="430" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#E52521">APLICACOES</text>
  <text x="430" y="118" text-anchor="middle" font-size="10" fill="#666666">Seus Agentes e Produtos de IA -- O Jogo Completo</text>

  <!-- Down arrow -->
  <text x="430" y="147" text-anchor="middle" font-size="14" fill="#999999">Construido com</text>

  <!-- ==================== LAYER 4: Copilot Studio ==================== -->
  <rect x="80" y="158" width="700" height="75" rx="8" ry="8" fill="white" stroke="#FBD000" stroke-width="2"/>
  <rect x="80" y="158" width="700" height="28" rx="8" ry="0" fill="#FBD000"/>
  <text x="430" y="177" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">COPILOT STUDIO -- Mario Maker dos Agentes</text>
  <text x="160" y="204" text-anchor="middle" font-size="10" fill="#333333">Low-code / No-code</text>
  <text x="320" y="204" text-anchor="middle" font-size="10" fill="#333333">Interface Visual</text>
  <text x="480" y="204" text-anchor="middle" font-size="10" fill="#333333">Templates Prontos</text>
  <text x="640" y="204" text-anchor="middle" font-size="10" fill="#333333">Multi-canal</text>
  <text x="160" y="220" text-anchor="middle" font-size="8" fill="#999999">Arraste e solte</text>
  <text x="320" y="220" text-anchor="middle" font-size="8" fill="#999999">Drag-and-drop</text>
  <text x="480" y="220" text-anchor="middle" font-size="8" fill="#999999">Comece rapido</text>
  <text x="640" y="220" text-anchor="middle" font-size="8" fill="#999999">Teams, Web, WhatsApp</text>

  <!-- Separator -->
  <line x1="240" y1="193" x2="240" y2="227" stroke="#FBD000" stroke-width="0.5" opacity="0.5"/>
  <line x1="400" y1="193" x2="400" y2="227" stroke="#FBD000" stroke-width="0.5" opacity="0.5"/>
  <line x1="560" y1="193" x2="560" y2="227" stroke="#FBD000" stroke-width="0.5" opacity="0.5"/>

  <!-- ==================== LAYER 3: AutoGen ==================== -->
  <rect x="80" y="248" width="700" height="75" rx="8" ry="8" fill="white" stroke="#43B047" stroke-width="2"/>
  <rect x="80" y="248" width="700" height="28" rx="8" ry="0" fill="#43B047"/>
  <text x="430" y="267" text-anchor="middle" font-size="13" font-weight="bold" fill="white">AUTOGEN -- Montador Automatico de Times</text>
  <text x="160" y="294" text-anchor="middle" font-size="10" fill="#333333">Multi-Agente</text>
  <text x="320" y="294" text-anchor="middle" font-size="10" fill="#333333">Conversacional</text>
  <text x="480" y="294" text-anchor="middle" font-size="10" fill="#333333">Auto-Coordenacao</text>
  <text x="640" y="294" text-anchor="middle" font-size="10" fill="#333333">Human-in-Loop</text>
  <text x="160" y="310" text-anchor="middle" font-size="8" fill="#999999">Varios agentes juntos</text>
  <text x="320" y="310" text-anchor="middle" font-size="8" fill="#999999">Conversam entre si</text>
  <text x="480" y="310" text-anchor="middle" font-size="8" fill="#999999">Se organizam sozinhos</text>
  <text x="640" y="310" text-anchor="middle" font-size="8" fill="#999999">Humano pode intervir</text>

  <line x1="240" y1="283" x2="240" y2="317" stroke="#43B047" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="283" x2="400" y2="317" stroke="#43B047" stroke-width="0.5" opacity="0.3"/>
  <line x1="560" y1="283" x2="560" y2="317" stroke="#43B047" stroke-width="0.5" opacity="0.3"/>

