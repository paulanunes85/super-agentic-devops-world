  <text x="800" y="518" text-anchor="middle" font-size="8" fill="#999999">Codespaces, Cloud</text>

  <!-- Bottom cycle connection -->
  <rect x="160" y="555" width="600" height="50" rx="8" ry="8" fill="white" stroke="#CCCCCC" stroke-width="1.5"/>
  <text x="460" y="575" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">Os 4 canais formam um CICLO CONTINUO de desenvolvimento</text>
  <text x="460" y="593" text-anchor="middle" font-size="9" fill="#666666">IDE (escreve) --> ChatOps (revisa) --> Background (deploya) --> Portal (verifica) --> IDE (proximo)</text>

