<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="Arial, sans-serif">
  <defs>
    <filter id="gh-shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="560" fill="#FAFAFA" rx="4"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#333333">GitHub Platform Map</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#666666">The hub of modern software development</text>

  <!-- Central GitHub node -->
  <g filter="url(#gh-shadow)">
    <circle cx="400" cy="260" r="55" fill="#FFFFFF" stroke="#333333" stroke-width="3"/>
    <text x="400" y="255" text-anchor="middle" font-size="18" font-weight="bold" fill="#333333">GitHub</text>
    <text x="400" y="275" text-anchor="middle" font-size="11" fill="#666666">Platform</text>
  </g>

  <!-- Spoke lines and nodes -->
  <!-- 1. Repositories (top) -->
  <line x1="400" y1="205" x2="400" y2="130" stroke="#049CD8" stroke-width="2"/>
  <g filter="url(#gh-shadow)">
    <rect x="320" y="80" width="160" height="50" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
    <text x="400" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">Repositories</text>
    <text x="400" y="120" text-anchor="middle" font-size="10" fill="#666666">Code storage &amp; versioning</text>
  </g>

  <!-- 2. Issues (top-right) -->
  <line x1="440" y1="215" x2="570" y2="130" stroke="#049CD8" stroke-width="2"/>
  <g filter="url(#gh-shadow)">
    <rect x="540" y="80" width="160" height="50" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
    <text x="620" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">Issues</text>
    <text x="620" y="120" text-anchor="middle" font-size="10" fill="#666666">Bug &amp; task tracking</text>
  </g>

  <!-- 3. Pull Requests (right) -->
  <line x1="455" y1="260" x2="560" y2="260" stroke="#049CD8" stroke-width="2"/>
  <g filter="url(#gh-shadow)">
    <rect x="560" y="235" width="160" height="50" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
    <text x="640" y="257" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">Pull Requests</text>
    <text x="640" y="275" text-anchor="middle" font-size="10" fill="#666666">Code review &amp; merge</text>
  </g>

  <!-- 4. Actions (bottom-right) -->
  <line x1="440" y1="305" x2="570" y2="380" stroke="#049CD8" stroke-width="2"/>
  <g filter="url(#gh-shadow)">
    <rect x="540" y="365" width="160" height="50" rx="8" fill="#FFFFFF" stroke="#E52521" stroke-width="2.5"/>
    <text x="620" y="387" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">Actions</text>
    <text x="620" y="405" text-anchor="middle" font-size="10" fill="#666666">CI/CD automation</text>
  </g>

  <!-- 5. Projects (bottom) -->
  <line x1="400" y1="315" x2="400" y2="380" stroke="#049CD8" stroke-width="2"/>
  <g filter="url(#gh-shadow)">
    <rect x="320" y="380" width="160" height="50" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
    <text x="400" y="402" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">Projects</text>
    <text x="400" y="420" text-anchor="middle" font-size="10" fill="#666666">Kanban &amp; planning</text>
  </g>

  <!-- 6. Codespaces (bottom-left) -->
  <line x1="360" y1="305" x2="230" y2="380" stroke="#049CD8" stroke-width="2"/>
  <g filter="url(#gh-shadow)">
    <rect x="100" y="365" width="160" height="50" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2.5"/>
    <text x="180" y="387" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">Codespaces</text>
    <text x="180" y="405" text-anchor="middle" font-size="10" fill="#666666">Cloud dev environments</text>
  </g>

  <!-- 7. Security (left) -->
  <line x1="345" y1="260" x2="240" y2="260" stroke="#049CD8" stroke-width="2"/>
  <g filter="url(#gh-shadow)">
    <rect x="80" y="235" width="160" height="50" rx="8" fill="#FFFFFF" stroke="#E52521" stroke-width="2.5"/>
    <text x="160" y="257" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">Security</text>
    <text x="160" y="275" text-anchor="middle" font-size="10" fill="#666666">Dependabot &amp; scanning</text>
  </g>

  <!-- 8. Pages (top-left) -->
  <line x1="360" y1="215" x2="230" y2="130" stroke="#049CD8" stroke-width="2"/>
  <g filter="url(#gh-shadow)">
    <rect x="100" y="80" width="160" height="50" rx="8" fill="#FFFFFF" stroke="#FBD000" stroke-width="2.5"/>
    <text x="180" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">Pages</text>
    <text x="180" y="120" text-anchor="middle" font-size="10" fill="#666666">Static site hosting</text>
  </g>

  <!-- Small connector dots at center circle edge -->
  <circle cx="400" cy="205" r="4" fill="#049CD8"/>
  <circle cx="440" cy="215" r="4" fill="#049CD8"/>
  <circle cx="455" cy="260" r="4" fill="#049CD8"/>
  <circle cx="440" cy="305" r="4" fill="#049CD8"/>
  <circle cx="400" cy="315" r="4" fill="#049CD8"/>
  <circle cx="360" cy="305" r="4" fill="#049CD8"/>
  <circle cx="345" cy="260" r="4" fill="#049CD8"/>
  <circle cx="360" cy="215" r="4" fill="#049CD8"/>

  <!-- Legend -->
  <g>
    <rect x="30" y="460" width="740" height="85" rx="8" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
    <text x="50" y="485" font-size="13" font-weight="bold" fill="#333333">Legend &mdash; GitHub Core Features</text>

    <rect x="50" y="500" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#049CD8" stroke-width="2"/>
    <text x="74" y="513" font-size="11" fill="#333333">Core features (Repos, Issues, PRs, Projects)</text>

    <rect x="310" y="500" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#E52521" stroke-width="2"/>
    <text x="334" y="513" font-size="11" fill="#333333">Automation &amp; security features</text>

    <rect x="540" y="500" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#43B047" stroke-width="2"/>
    <text x="564" y="513" font-size="11" fill="#333333">Developer environments</text>

    <rect x="50" y="524" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#FBD000" stroke-width="2"/>
    <text x="74" y="537" font-size="11" fill="#333333">Publishing &amp; hosting</text>

    <line x1="310" y1="532" x2="330" y2="532" stroke="#049CD8" stroke-width="2"/>
    <circle cx="325" cy="532" r="3" fill="#049CD8"/>
    <text x="338" y="536" font-size="11" fill="#333333">Connection to GitHub platform hub</text>
  </g>
</svg>