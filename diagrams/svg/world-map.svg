<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" font-family="Arial, sans-serif">
  <rect width="1100" height="640" fill="#FAFAFA" rx="12"/>

  <text x="550" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#333333">Super Agentic DevOps World</text>
  <text x="550" y="58" text-anchor="middle" font-size="13" fill="#666666">8 Worlds from beginner to advanced</text>

  <!-- Row 1: Worlds 1-4 -->
  <rect x="20" y="80" width="250" height="150" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="3"/>
