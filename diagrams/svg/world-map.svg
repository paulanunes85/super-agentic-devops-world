  <text x="145" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">World 1 - Green Plains</text>
  <text x="35" y="125" font-size="11" fill="#333333">VS Code, Git, GitHub</text>
  <text x="35" y="142" font-size="11" fill="#333333">GitHub Actions, CI/CD</text>
  <text x="35" y="159" font-size="11" fill="#333333">Azure, AI Foundry</text>
  <text x="35" y="180" font-size="10" fill="#999999">8 Levels</text>

  <line x1="270" y1="155" x2="290" y2="155" stroke="#666" stroke-width="2"/>
  <polygon points="288,151 296,155 288,159" fill="#666"/>

  <rect x="290" y="80" width="250" height="150" rx="8" fill="#FFFFFF" stroke="#8B5E3C" stroke-width="3"/>
  <rect x="290" y="80" width="250" height="28" rx="8" fill="#8B5E3C"/>
  <text x="415" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">World 2 - Underground</text>
  <text x="305" y="125" font-size="11" fill="#333333">Environments, APIs</text>
  <text x="305" y="142" font-size="11" fill="#333333">Security, DNS, DevOps</text>
  <text x="305" y="159" font-size="11" fill="#333333">IaC, Observability</text>
  <text x="305" y="180" font-size="10" fill="#999999">8 Levels</text>

  <line x1="540" y1="155" x2="560" y2="155" stroke="#666" stroke-width="2"/>
  <polygon points="558,151 566,155 558,159" fill="#666"/>

  <rect x="560" y="80" width="250" height="150" rx="8" fill="#FFFFFF" stroke="#87CEEB" stroke-width="3"/>
  <rect x="560" y="80" width="250" height="28" rx="8" fill="#87CEEB"/>
  <text x="685" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">World 3 - Sky World</text>
  <text x="575" y="125" font-size="11" fill="#333333">Terminal, Docker, Tests</text>
  <text x="575" y="142" font-size="11" fill="#333333">Databases, Languages</text>
  <text x="575" y="159" font-size="11" fill="#333333">Frameworks, Packages</text>
  <text x="575" y="180" font-size="10" fill="#999999">12 Levels</text>

  <line x1="810" y1="155" x2="830" y2="155" stroke="#666" stroke-width="2"/>
  <polygon points="828,151 836,155 828,159" fill="#666"/>

  <rect x="830" y="80" width="250" height="150" rx="8" fill="#FFFFFF" stroke="#1E90FF" stroke-width="3"/>
  <rect x="830" y="80" width="250" height="28" rx="8" fill="#1E90FF"/>
  <text x="955" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">World 4 - Water World</text>
  <text x="845" y="125" font-size="11" fill="#333333">Auth/JWT, Cloud Models</text>
  <text x="845" y="142" font-size="11" fill="#333333">Architecture, Deploy</text>
  <text x="845" y="159" font-size="11" fill="#333333">Cache, Messaging</text>
  <text x="845" y="180" font-size="10" fill="#999999">9 Levels</text>

