  <line x1="955" y1="230" x2="955" y2="290" stroke="#666" stroke-width="2"/>
  <polygon points="951,288 955,296 959,288" fill="#666"/>

  <!-- Row 2: Worlds 5-8 (right to left) -->
  <rect x="830" y="296" width="250" height="150" rx="8" fill="#FFFFFF" stroke="#FF6B35" stroke-width="3"/>
  <rect x="830" y="296" width="250" height="28" rx="8" fill="#FF6B35"/>
