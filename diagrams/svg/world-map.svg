<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Arial, sans-serif">
  <defs>
    <marker id="wm-arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43B047"/>
    </marker>
    <filter id="wm-shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="620" fill="#FAFAFA" rx="4"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#333333">Super Agentic DevOps World &mdash; Complete World Map</text>
  <text x="550" y="58" text-anchor="middle" font-size="13" fill="#666666">8 worlds from beginner to advanced</text>

  <!-- Row 1: Worlds 1-4 -->
  <!-- World 1 -->
  <g filter="url(#wm-shadow)">
    <rect x="30" y="85" width="230" height="130" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2.5"/>
    <rect x="30" y="85" width="230" height="30" rx="8" fill="#43B047" opacity="0.12"/>
    <text x="145" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">World 1 &mdash; Green Hills</text>
    <text x="45" y="132" font-size="11" fill="#333333">&#8226; Terminal &amp; Shell basics</text>
    <text x="45" y="150" font-size="11" fill="#333333">&#8226; File system navigation</text>
    <text x="45" y="168" font-size="11" fill="#333333">&#8226; Package managers</text>
    <circle cx="240" cy="200" r="10" fill="#43B047" opacity="0.2" stroke="#43B047" stroke-width="1"/>
    <text x="240" y="204" text-anchor="middle" font-size="10" font-weight="bold" fill="#43B047">1</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="150" x2="285" y2="150" stroke="#43B047" stroke-width="2" marker-end="url(#wm-arrow)"/>

  <!-- World 2 -->
  <g filter="url(#wm-shadow)">
    <rect x="295" y="85" width="230" height="130" rx="8" fill="#FFFFFF" stroke="#8B5E3C" stroke-width="2.5"/>
    <rect x="295" y="85" width="230" height="30" rx="8" fill="#8B5E3C" opacity="0.12"/>
    <text x="410" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">World 2 &mdash; Underground</text>
    <text x="310" y="132" font-size="11" fill="#333333">&#8226; Git fundamentals</text>
    <text x="310" y="150" font-size="11" fill="#333333">&#8226; Branching &amp; merging</text>
    <text x="310" y="168" font-size="11" fill="#333333">&#8226; Commit strategies</text>
    <circle cx="505" cy="200" r="10" fill="#8B5E3C" opacity="0.2" stroke="#8B5E3C" stroke-width="1"/>
    <text x="505" y="204" text-anchor="middle" font-size="10" font-weight="bold" fill="#8B5E3C">2</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="525" y1="150" x2="555" y2="150" stroke="#43B047" stroke-width="2" marker-end="url(#wm-arrow)"/>

  <!-- World 3 -->
  <g filter="url(#wm-shadow)">
    <rect x="565" y="85" width="230" height="130" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
    <rect x="565" y="85" width="230" height="30" rx="8" fill="#049CD8" opacity="0.12"/>
    <text x="680" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">World 3 &mdash; Sky World</text>
    <text x="580" y="132" font-size="11" fill="#333333">&#8226; GitHub platform</text>
    <text x="580" y="150" font-size="11" fill="#333333">&#8226; Pull requests &amp; reviews</text>
    <text x="580" y="168" font-size="11" fill="#333333">&#8226; Collaboration workflows</text>
    <circle cx="775" cy="200" r="10" fill="#049CD8" opacity="0.2" stroke="#049CD8" stroke-width="1"/>
    <text x="775" y="204" text-anchor="middle" font-size="10" font-weight="bold" fill="#049CD8">3</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="795" y1="150" x2="825" y2="150" stroke="#43B047" stroke-width="2" marker-end="url(#wm-arrow)"/>

  <!-- World 4 -->
  <g filter="url(#wm-shadow)">
    <rect x="835" y="85" width="230" height="130" rx="8" fill="#FFFFFF" stroke="#0056A0" stroke-width="2.5"/>
    <rect x="835" y="85" width="230" height="30" rx="8" fill="#0056A0" opacity="0.12"/>
    <text x="950" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">World 4 &mdash; Ocean Depths</text>
    <text x="850" y="132" font-size="11" fill="#333333">&#8226; CI/CD pipelines</text>
    <text x="850" y="150" font-size="11" fill="#333333">&#8226; GitHub Actions</text>
    <text x="850" y="168" font-size="11" fill="#333333">&#8226; Automated testing</text>
    <circle cx="1045" cy="200" r="10" fill="#0056A0" opacity="0.2" stroke="#0056A0" stroke-width="1"/>
    <text x="1045" y="204" text-anchor="middle" font-size="10" font-weight="bold" fill="#0056A0">4</text>
  </g>

  <!-- Connecting curve from row 1 to row 2 -->
  <path d="M 950 215 Q 950 260 950 275 Q 950 290 935 290 L 965 290" fill="none" stroke="#43B047" stroke-width="2"/>
  <path d="M 950 215 L 950 290" fill="none" stroke="#43B047" stroke-width="2" marker-end="url(#wm-arrow)"/>

  <!-- Row 2: Worlds 8-5 (reversed so arrow from 4 goes down to 5 on right) -->
  <!-- World 5 -->
  <g filter="url(#wm-shadow)">
    <rect x="835" y="300" width="230" height="130" rx="8" fill="#FFFFFF" stroke="#E87000" stroke-width="2.5"/>
    <rect x="835" y="300" width="230" height="30" rx="8" fill="#E87000" opacity="0.12"/>
    <text x="950" y="321" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">World 5 &mdash; Lava Land</text>
    <text x="850" y="347" font-size="11" fill="#333333">&#8226; Containers &amp; Docker</text>
    <text x="850" y="365" font-size="11" fill="#333333">&#8226; Kubernetes basics</text>
    <text x="850" y="383" font-size="11" fill="#333333">&#8226; Infrastructure as Code</text>
    <circle cx="1045" cy="415" r="10" fill="#E87000" opacity="0.2" stroke="#E87000" stroke-width="1"/>
    <text x="1045" y="419" text-anchor="middle" font-size="10" font-weight="bold" fill="#E87000">5</text>
  </g>

  <!-- Arrow 5→6 (right to left) -->
  <line x1="835" y1="365" x2="800" y2="365" stroke="#43B047" stroke-width="2" marker-end="url(#wm-arrow)"/>

  <!-- World 6 -->
  <g filter="url(#wm-shadow)">
    <rect x="565" y="300" width="230" height="130" rx="8" fill="#FFFFFF" stroke="#A01010" stroke-width="2.5"/>
    <rect x="565" y="300" width="230" height="30" rx="8" fill="#A01010" opacity="0.12"/>
    <text x="680" y="321" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">World 6 &mdash; Dark Fortress</text>
    <text x="580" y="347" font-size="11" fill="#333333">&#8226; Security &amp; compliance</text>
    <text x="580" y="365" font-size="11" fill="#333333">&#8226; Secret management</text>
    <text x="580" y="383" font-size="11" fill="#333333">&#8226; Vulnerability scanning</text>
    <circle cx="775" cy="415" r="10" fill="#A01010" opacity="0.2" stroke="#A01010" stroke-width="1"/>
    <text x="775" y="419" text-anchor="middle" font-size="10" font-weight="bold" fill="#A01010">6</text>
  </g>

  <!-- Arrow 6→7 -->
  <line x1="565" y1="365" x2="530" y2="365" stroke="#43B047" stroke-width="2" marker-end="url(#wm-arrow)"/>

  <!-- World 7 -->
  <g filter="url(#wm-shadow)">
    <rect x="295" y="300" width="230" height="130" rx="8" fill="#FFFFFF" stroke="#7B2D8E" stroke-width="2.5"/>
    <rect x="295" y="300" width="230" height="30" rx="8" fill="#7B2D8E" opacity="0.12"/>
    <text x="410" y="321" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">World 7 &mdash; Star Road</text>
    <text x="310" y="347" font-size="11" fill="#333333">&#8226; AI Agents in DevOps</text>
    <text x="310" y="365" font-size="11" fill="#333333">&#8226; Copilot &amp; Claude Code</text>
    <text x="310" y="383" font-size="11" fill="#333333">&#8226; Agentic workflows</text>
    <circle cx="505" cy="415" r="10" fill="#7B2D8E" opacity="0.2" stroke="#7B2D8E" stroke-width="1"/>
    <text x="505" y="419" text-anchor="middle" font-size="10" font-weight="bold" fill="#7B2D8E">7</text>
  </g>

  <!-- Arrow 7→8 -->
  <line x1="295" y1="365" x2="265" y2="365" stroke="#43B047" stroke-width="2" marker-end="url(#wm-arrow)"/>

  <!-- World 8 -->
  <g filter="url(#wm-shadow)">
    <rect x="30" y="300" width="230" height="130" rx="8" fill="#FFFFFF" stroke="#FBD000" stroke-width="2.5"/>
    <rect x="30" y="300" width="230" height="30" rx="8" fill="#FBD000" opacity="0.12"/>
    <text x="145" y="321" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">World 8 &mdash; Final Castle</text>
    <text x="45" y="347" font-size="11" fill="#333333">&#8226; Full platform engineering</text>
    <text x="45" y="365" font-size="11" fill="#333333">&#8226; Observability &amp; SRE</text>
    <text x="45" y="383" font-size="11" fill="#333333">&#8226; Career boss battle</text>
    <circle cx="240" cy="415" r="10" fill="#FBD000" opacity="0.2" stroke="#FBD000" stroke-width="1"/>
    <text x="240" y="419" text-anchor="middle" font-size="10" font-weight="bold" fill="#B89A00">8</text>
  </g>

  <!-- Finish flag at World 8 -->
  <g transform="translate(55, 410)">
    <rect x="0" y="0" width="14" height="14" fill="#333333"/>
    <rect x="0" y="0" width="7" height="7" fill="#FFFFFF"/>
    <rect x="7" y="7" width="7" height="7" fill="#FFFFFF"/>
  </g>
  <text x="75" y="422" font-size="10" font-weight="bold" fill="#333333">FINISH</text>

  <!-- Legend -->
  <g>
    <rect x="30" y="465" width="1040" height="140" rx="8" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
    <text x="50" y="488" font-size="13" font-weight="bold" fill="#333333">Legend &mdash; World Progression</text>
    <text x="50" y="508" font-size="11" fill="#666666">Worlds progress from beginner (top-left) to advanced (bottom-left). Follow the green arrows.</text>

    <!-- Color swatches -->
    <rect x="50" y="522" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#43B047" stroke-width="2"/>
    <text x="74" y="535" font-size="11" fill="#333333">Green Hills (Basics)</text>

    <rect x="210" y="522" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#8B5E3C" stroke-width="2"/>
    <text x="234" y="535" font-size="11" fill="#333333">Underground (Git)</text>

    <rect x="380" y="522" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#049CD8" stroke-width="2"/>
    <text x="404" y="535" font-size="11" fill="#333333">Sky World (GitHub)</text>

    <rect x="560" y="522" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#0056A0" stroke-width="2"/>
    <text x="584" y="535" font-size="11" fill="#333333">Ocean (CI/CD)</text>

    <rect x="50" y="550" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#E87000" stroke-width="2"/>
    <text x="74" y="563" font-size="11" fill="#333333">Lava Land (Containers)</text>

    <rect x="210" y="550" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#A01010" stroke-width="2"/>
    <text x="234" y="563" font-size="11" fill="#333333">Dark Fortress (Security)</text>

    <rect x="380" y="550" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#7B2D8E" stroke-width="2"/>
    <text x="404" y="563" font-size="11" fill="#333333">Star Road (AI Agents)</text>

    <rect x="560" y="550" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#FBD000" stroke-width="2"/>
    <text x="584" y="563" font-size="11" fill="#333333">Final Castle (Mastery)</text>

    <line x1="750" y1="527" x2="790" y2="527" stroke="#43B047" stroke-width="2" marker-end="url(#wm-arrow)"/>
    <text x="798" y="531" font-size="11" fill="#333333">Direction of progression</text>
  </g>
</svg>