  <text x="845" y="341" font-size="11" fill="#333333">Copilot (all modes)</text>
  <text x="845" y="358" font-size="11" fill="#333333">AI Agents, Autonomous</text>
  <text x="845" y="375" font-size="11" fill="#333333">GHAS, SDD, MCP</text>
  <text x="845" y="396" font-size="10" fill="#999999">11 Levels</text>

  <line x1="830" y1="371" x2="810" y2="371" stroke="#666" stroke-width="2"/>
  <polygon points="812,367 804,371 812,375" fill="#666"/>

  <rect x="560" y="296" width="250" height="150" rx="8" fill="#FFFFFF" stroke="#8B0000" stroke-width="3"/>
