  <text x="685" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">World 6 - Bowser Castle 2</text>
  <text x="575" y="341" font-size="11" fill="#333333">Custom Agents, Skills</text>
  <text x="575" y="358" font-size="11" fill="#333333">Instructions, Hooks, MCP</text>
  <text x="575" y="375" font-size="11" fill="#333333">Orchestration, Tokens</text>
  <text x="575" y="396" font-size="10" fill="#999999">10 Levels</text>

  <line x1="560" y1="371" x2="540" y2="371" stroke="#666" stroke-width="2"/>
  <polygon points="542,367 534,371 542,375" fill="#666"/>

  <rect x="290" y="296" width="250" height="150" rx="8" fill="#FFFFFF" stroke="#9B59B6" stroke-width="3"/>
  <rect x="290" y="296" width="250" height="28" rx="8" fill="#9B59B6"/>
  <text x="415" y="316" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">World 7 - Star World</text>
  <text x="305" y="341" font-size="11" fill="#333333">AI Foundry, RAG</text>
  <text x="305" y="358" font-size="11" fill="#333333">LangChain, Semantic Kernel</text>
  <text x="305" y="375" font-size="11" fill="#333333">4 Channels, IDP/Backstage</text>
  <text x="305" y="396" font-size="10" fill="#999999">7 Levels</text>

  <line x1="290" y1="371" x2="270" y2="371" stroke="#666" stroke-width="2"/>
  <polygon points="272,367 264,371 272,375" fill="#666"/>

  <rect x="20" y="296" width="250" height="150" rx="8" fill="#FFFFFF" stroke="#FFD700" stroke-width="3"/>
  <rect x="20" y="296" width="250" height="28" rx="8" fill="#FFD700"/>
  <text x="145" y="316" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">World 8 - Final Castle</text>
  <text x="35" y="341" font-size="11" fill="#333333">How Everything Connects</text>
  <text x="35" y="358" font-size="11" fill="#333333">Boss Rush Review</text>
  <text x="35" y="375" font-size="11" fill="#333333">Glossary (124+ terms)</text>
  <text x="35" y="396" font-size="10" fill="#999999">4 Levels</text>

  <!-- Legend -->
  <rect x="20" y="476" width="1060" height="145" rx="8" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
  <text x="550" y="500" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Legend</text>

  <rect x="40" y="515" width="14" height="14" fill="#43B047" rx="3"/>
  <text x="60" y="527" font-size="11" fill="#333333">W1 Green Plains</text>
  <rect x="200" y="515" width="14" height="14" fill="#8B5E3C" rx="3"/>
  <text x="220" y="527" font-size="11" fill="#333333">W2 Underground</text>
  <rect x="360" y="515" width="14" height="14" fill="#87CEEB" rx="3"/>
  <text x="380" y="527" font-size="11" fill="#333333">W3 Sky World</text>
  <rect x="520" y="515" width="14" height="14" fill="#1E90FF" rx="3"/>
  <text x="540" y="527" font-size="11" fill="#333333">W4 Water World</text>

  <rect x="40" y="545" width="14" height="14" fill="#FF6B35" rx="3"/>
  <text x="60" y="557" font-size="11" fill="#333333">W5 Bowser Castle 1</text>
  <rect x="200" y="545" width="14" height="14" fill="#8B0000" rx="3"/>
  <text x="220" y="557" font-size="11" fill="#333333">W6 Bowser Castle 2</text>
  <rect x="360" y="545" width="14" height="14" fill="#9B59B6" rx="3"/>
  <text x="380" y="557" font-size="11" fill="#333333">W7 Star World</text>
  <rect x="520" y="545" width="14" height="14" fill="#FFD700" rx="3"/>
  <text x="540" y="557" font-size="11" fill="#333333">W8 Final Castle</text>

  <text x="40" y="590" font-size="11" fill="#999999">Beginner (World 1) to Advanced (World 8) - Each world builds on the previous</text>
  <text x="40" y="607" font-size="11" fill="#999999">Total: 69 levels + SDD special chapter</text>
</svg>
