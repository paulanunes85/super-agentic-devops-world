<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    text { font-family: Arial, sans-serif; fill: #333333; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold">Developer Skill Tree</text>

  <!-- Level 1: Small Mario (Apprentice) - Green -->
  <rect x="30" y="310" width="120" height="60" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2.5"/>
  <text x="90" y="333" text-anchor="middle" font-size="11" font-weight="bold">Level 1</text>
  <text x="90" y="348" text-anchor="middle" font-size="10">Small Mario</text>
  <text x="90" y="362" text-anchor="middle" font-size="9" fill="#43B047">Apprentice</text>
  <text x="90" y="390" text-anchor="middle" font-size="9">Basics</text>

  <!-- Step connector 1→2 -->
  <line x1="150" y1="340" x2="180" y2="340" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="180" y1="340" x2="180" y2="280" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Level 2: Big Mario (Junior) - Blue -->
  <rect x="180" y="250" width="120" height="60" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2.5"/>
  <text x="240" y="273" text-anchor="middle" font-size="11" font-weight="bold">Level 2</text>
  <text x="240" y="288" text-anchor="middle" font-size="10">Big Mario</text>
  <text x="240" y="302" text-anchor="middle" font-size="9" fill="#049CD8">Junior</text>
  <text x="240" y="328" text-anchor="middle" font-size="9">Tools</text>

  <!-- Step connector 2→3 -->
  <line x1="300" y1="280" x2="330" y2="280" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="330" y1="280" x2="330" y2="220" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Level 3: Fire Mario (Mid) - Gold -->
  <rect x="330" y="190" width="120" height="60" rx="8" fill="#FFFFFF" stroke="#FBD000" stroke-width="2.5"/>
  <text x="390" y="213" text-anchor="middle" font-size="11" font-weight="bold">Level 3</text>
  <text x="390" y="228" text-anchor="middle" font-size="10">Fire Mario</text>
  <text x="390" y="242" text-anchor="middle" font-size="9" fill="#B8960A">Mid-Level</text>
  <text x="390" y="268" text-anchor="middle" font-size="9">Architecture</text>

  <!-- Step connector 3→4 -->
  <line x1="450" y1="220" x2="480" y2="220" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="480" y1="220" x2="480" y2="160" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Level 4: Cape Mario (Senior) - Orange -->
  <rect x="480" y="130" width="120" height="60" rx="8" fill="#FFFFFF" stroke="#E8750A" stroke-width="2.5"/>
  <text x="540" y="153" text-anchor="middle" font-size="11" font-weight="bold">Level 4</text>
  <text x="540" y="168" text-anchor="middle" font-size="10">Cape Mario</text>
  <text x="540" y="182" text-anchor="middle" font-size="9" fill="#E8750A">Senior</text>
  <text x="540" y="208" text-anchor="middle" font-size="9">Agents</text>

  <!-- Step connector 4→5 -->
  <line x1="600" y1="160" x2="630" y2="160" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="630" y1="160" x2="630" y2="100" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Level 5: Star Mario (Legend) - Red -->
  <rect x="630" y="70" width="130" height="60" rx="8" fill="#FFFFFF" stroke="#E52521" stroke-width="2.5"/>
  <text x="695" y="93" text-anchor="middle" font-size="11" font-weight="bold">Level 5 ★</text>
  <text x="695" y="108" text-anchor="middle" font-size="10">Star Mario</text>
  <text x="695" y="122" text-anchor="middle" font-size="9" fill="#E52521">Legend</text>
  <text x="695" y="148" text-anchor="middle" font-size="9">Everything</text>

  <!-- Staircase background line -->
  <polyline points="90,370 90,310 240,310 240,250 390,250 390,190 540,190 540,130 695,130 695,70"
            fill="none" stroke="#DDD" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Legend -->
  <rect x="30" y="45" width="260" height="30" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="1"/>
  <text x="160" y="65" text-anchor="middle" font-size="11">Green → Blue → Gold → Orange → Red</text>
</svg>