<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowFlow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666666"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E52521"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#43B047"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333333">Loop de Planejamento do Agente Autonomo</text>
  <text x="440" y="50" text-anchor="middle" font-size="13" fill="#666666">Goal - Decompose - Plan - Execute - Evaluate - Retry/Return</text>

  <!-- Guardrails boundary -->
  <rect x="40" y="65" width="800" height="470" rx="12" ry="12" fill="none" stroke="#E52521" stroke-width="2.5" stroke-dasharray="10,5"/>
  <rect x="290" y="56" width="300" height="20" rx="4" ry="4" fill="white"/>
  <text x="440" y="71" text-anchor="middle" font-size="12" font-weight="bold" fill="#E52521">GUARDRAILS (Paredes Invisiveis)</text>

  <!-- Guardrail labels on sides -->
  <text x="58" y="300" text-anchor="middle" font-size="9" fill="#E52521" transform="rotate(-90, 58, 300)">Escopo | Seguranca | Timeout</text>
  <text x="822" y="300" text-anchor="middle" font-size="9" fill="#E52521" transform="rotate(90, 822, 300)">Orcamento | Aprovacao | Reversibilidade</text>

  <!-- Step 1: Goal Received -->
  <rect x="330" y="90" width="220" height="48" rx="8" ry="8" fill="white" stroke="#E52521" stroke-width="2"/>
  <text x="440" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">OBJETIVO RECEBIDO</text>
  <text x="440" y="128" text-anchor="middle" font-size="10" fill="#666666">"Resolve esta issue"</text>

  <!-- Arrow 1->2 -->
  <line x1="440" y1="138" x2="440" y2="170" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowFlow)"/>

  <!-- Step 2: Decompose -->
  <rect x="310" y="174" width="260" height="44" rx="8" ry="8" fill="white" stroke="#049CD8" stroke-width="2"/>
  <text x="440" y="194" text-anchor="middle" font-size="12" font-weight="bold" fill="#049CD8">1. DECOMPOSICAO</text>
  <text x="440" y="210" text-anchor="middle" font-size="10" fill="#333333">Quebrar em sub-tarefas</text>

  <!-- Arrow 2->3 -->
  <line x1="440" y1="218" x2="440" y2="240" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowFlow)"/>

  <!-- Step 3: Plan -->
  <rect x="310" y="244" width="260" height="44" rx="8" ry="8" fill="white" stroke="#049CD8" stroke-width="2"/>
  <text x="440" y="264" text-anchor="middle" font-size="12" font-weight="bold" fill="#049CD8">2. PLANEJAMENTO</text>
  <text x="440" y="280" text-anchor="middle" font-size="10" fill="#333333">Ordenar sub-tarefas em sequencia</text>

  <!-- Arrow 3->4 -->
  <line x1="440" y1="288" x2="440" y2="310" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowFlow)"/>

  <!-- Step 4: Select Tools -->
  <rect x="310" y="314" width="260" height="44" rx="8" ry="8" fill="white" stroke="#FBD000" stroke-width="2"/>
  <text x="440" y="334" text-anchor="middle" font-size="12" font-weight="bold" fill="#B8960A">3. SELECAO DE TOOLS</text>
  <text x="440" y="350" text-anchor="middle" font-size="10" fill="#333333">Escolher ferramentas certas</text>

  <!-- Arrow 4->5 -->
  <line x1="440" y1="358" x2="440" y2="380" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowFlow)"/>

  <!-- Step 5: Execute -->
  <rect x="310" y="384" width="260" height="44" rx="8" ry="8" fill="white" stroke="#43B047" stroke-width="2"/>
  <text x="440" y="404" text-anchor="middle" font-size="12" font-weight="bold" fill="#43B047">4. EXECUCAO</text>
  <text x="440" y="420" text-anchor="middle" font-size="10" fill="#333333">Executar cada sub-tarefa</text>

  <!-- Arrow 5->6 -->
  <line x1="440" y1="428" x2="440" y2="450" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowFlow)"/>

  <!-- Step 6: Evaluate -->
  <rect x="340" y="454" width="200" height="44" rx="22" ry="22" fill="white" stroke="#E52521" stroke-width="2"/>
  <text x="440" y="475" text-anchor="middle" font-size="12" font-weight="bold" fill="#E52521">5. AUTO-AVALIACAO</text>
  <text x="440" y="490" text-anchor="middle" font-size="10" fill="#333333">Deu certo?</text>

  <!-- NAO branch (retry) - loops back to Execute -->
  <line x1="340" y1="476" x2="200" y2="476" stroke="#E52521" stroke-width="1.5"/>
  <line x1="200" y1="476" x2="200" y2="370" stroke="#E52521" stroke-width="1.5"/>
  <line x1="200" y1="370" x2="310" y2="406" stroke="#E52521" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="100" y="410" width="90" height="40" rx="8" ry="8" fill="white" stroke="#E52521" stroke-width="1.5"/>
  <text x="145" y="427" text-anchor="middle" font-size="10" font-weight="bold" fill="#E52521">6. AJUSTE</text>
  <text x="145" y="442" text-anchor="middle" font-size="9" fill="#333333">Mudar plano</text>
  <text x="260" y="468" text-anchor="middle" font-size="10" font-weight="bold" fill="#E52521">NAO</text>

  <!-- SIM branch (return) -->
  <line x1="540" y1="476" x2="660" y2="476" stroke="#43B047" stroke-width="1.5"/>
  <line x1="660" y1="476" x2="660" y2="510" stroke="#43B047" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="600" y="468" text-anchor="middle" font-size="10" font-weight="bold" fill="#43B047">SIM</text>

  <!-- Result: Delivery -->
  <rect x="590" y="514" width="140" height="44" rx="8" ry="8" fill="#43B047" stroke="#43B047" stroke-width="2"/>
  <text x="660" y="534" text-anchor="middle" font-size="12" font-weight="bold" fill="white">ENTREGA</text>
  <text x="660" y="549" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)">PR pronto!</text>

  <!-- Right side: Guardrail details -->
  <rect x="620" y="100" width="195" height="200" rx="8" ry="8" fill="white" stroke="#E52521" stroke-width="1.5"/>
  <text x="717" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#E52521">Guardrails Ativos</text>
  <line x1="630" y1="128" x2="805" y2="128" stroke="#E52521" stroke-width="0.5"/>
  <text x="635" y="148" font-size="10" fill="#333333">Escopo limitado</text>
  <text x="635" y="163" font-size="9" fill="#999999">So edita /src e /tests</text>
  <text x="635" y="183" font-size="10" fill="#333333">Timeout</text>
  <text x="635" y="198" font-size="9" fill="#999999">Max 30 min de execucao</text>
  <text x="635" y="218" font-size="10" fill="#333333">Orcamento de tokens</text>
  <text x="635" y="233" font-size="9" fill="#999999">Max 50.000 tokens</text>
  <text x="635" y="253" font-size="10" fill="#333333">Aprovacao humana</text>
  <text x="635" y="268" font-size="9" fill="#999999">PR precisa de review</text>
  <text x="635" y="288" font-size="10" fill="#333333">Reversibilidade</text>
  <text x="635" y="303" font-size="9" fill="#999999">Tudo via PR, nunca direto</text>

  <!-- Left side: Pillar labels -->
  <rect x="70" y="160" width="170" height="170" rx="8" ry="8" fill="white" stroke="#049CD8" stroke-width="1.5"/>
  <text x="155" y="180" text-anchor="middle" font-size="11" font-weight="bold" fill="#049CD8">5 Pilares da Autonomia</text>
  <line x1="80" y1="188" x2="230" y2="188" stroke="#049CD8" stroke-width="0.5"/>
  <text x="85" y="206" font-size="10" fill="#333333">1. Decomposicao</text>
  <text x="85" y="224" font-size="10" fill="#333333">2. Planejamento</text>
  <text x="85" y="242" font-size="10" fill="#333333">3. Selecao de Tools</text>
  <text x="85" y="260" font-size="10" fill="#333333">4. Auto-Avaliacao</text>
  <text x="85" y="278" font-size="10" fill="#333333">5. Recuperacao de Erros</text>
  <text x="85" y="305" font-size="9" fill="#999999">Sem estes pilares, o agente</text>
  <text x="85" y="318" font-size="9" fill="#999999">e apenas um script.</text>

  <!-- Legend -->
  <rect x="70" y="548" width="360" height="30" rx="6" ry="6" fill="white" stroke="#CCCCCC" stroke-width="1"/>
  <text x="80" y="567" font-size="9" font-weight="bold" fill="#333333">Legenda:</text>
  <rect x="130" y="557" width="10" height="10" rx="2" fill="#049CD8"/>
  <text x="144" y="567" font-size="9" fill="#666666">Planejamento</text>
  <rect x="210" y="557" width="10" height="10" rx="2" fill="#FBD000"/>
  <text x="224" y="567" font-size="9" fill="#666666">Selecao</text>
  <rect x="272" y="557" width="10" height="10" rx="2" fill="#43B047"/>
  <text x="286" y="567" font-size="9" fill="#666666">Execucao/Entrega</text>
  <rect x="368" y="557" width="10" height="10" rx="2" fill="#E52521"/>
  <text x="382" y="567" font-size="9" fill="#666666">Avaliacao/Guardrails</text>
</svg>