<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <style>
    text { font-family: Arial, sans-serif; fill: #333333; }
  </style>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold">End-to-End Developer Flow</text>

  <!-- Boxes -->
  <rect x="20" y="100" width="100" height="50" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2"/>
  <text x="70" y="130" text-anchor="middle" font-size="13">Developer</text>

  <rect x="160" y="100" width="100" height="50" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2"/>
  <text x="210" y="130" text-anchor="middle" font-size="13">VS Code</text>

  <rect x="300" y="100" width="100" height="50" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2"/>
  <text x="350" y="130" text-anchor="middle" font-size="13">Git</text>

  <rect x="440" y="100" width="100" height="50" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2"/>
  <text x="490" y="130" text-anchor="middle" font-size="13">GitHub</text>

  <rect x="580" y="100" width="100" height="50" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2"/>
  <text x="630" y="130" text-anchor="middle" font-size="13">Actions</text>

  <rect x="720" y="100" width="100" height="50" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2"/>
  <text x="770" y="130" text-anchor="middle" font-size="13">Azure</text>

  <!-- Final destination -->
  <rect x="720" y="190" width="100" height="50" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2"/>
  <text x="770" y="220" text-anchor="middle" font-size="13">Users</text>

  <!-- Arrows between boxes -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#049CD8"/>
    </marker>
  </defs>

  <line x1="120" y1="125" x2="155" y2="125" stroke="#049CD8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="260" y1="125" x2="295" y2="125" stroke="#049CD8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="125" x2="435" y2="125" stroke="#049CD8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="540" y1="125" x2="575" y2="125" stroke="#049CD8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="680" y1="125" x2="715" y2="125" stroke="#049CD8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="770" y1="150" x2="770" y2="185" stroke="#049CD8" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Legend -->
  <rect x="20" y="260" width="300" height="30" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="1"/>
  <text x="170" y="280" text-anchor="middle" font-size="12" fill="#333333">Legend: The complete developer workflow</text>
</svg>