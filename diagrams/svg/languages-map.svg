<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    text { font-family: Arial, sans-serif; fill: #333333; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold">Programming Languages Map</text>

  <!-- Row Labels -->
  <text x="60" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#049CD8">Frontend</text>
  <text x="60" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#43B047">Backend</text>
  <text x="60" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#E52521">Systems</text>
  <text x="60" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#FBD000">Data</text>

  <!-- Frontend Row (Blue borders) -->
  <rect x="120" y="60" width="140" height="45" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2"/>
  <text x="190" y="87" text-anchor="middle" font-size="13">JavaScript</text>

  <rect x="280" y="60" width="140" height="45" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2"/>
  <text x="350" y="87" text-anchor="middle" font-size="13">TypeScript</text>

  <rect x="440" y="60" width="140" height="45" rx="8" fill="#FFFFFF" stroke="#049CD8" stroke-width="2"/>
  <text x="510" y="87" text-anchor="middle" font-size="13">HTML/CSS</text>

  <!-- Backend Row (Green borders) -->
  <rect x="120" y="140" width="120" height="45" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2"/>
  <text x="180" y="167" text-anchor="middle" font-size="13">Python</text>

  <rect x="260" y="140" width="120" height="45" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2"/>
  <text x="320" y="167" text-anchor="middle" font-size="13">C#</text>

  <rect x="400" y="140" width="120" height="45" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2"/>
  <text x="460" y="167" text-anchor="middle" font-size="13">Java</text>

  <rect x="540" y="140" width="120" height="45" rx="8" fill="#FFFFFF" stroke="#43B047" stroke-width="2"/>
  <text x="600" y="167" text-anchor="middle" font-size="13">Go</text>

  <!-- Systems Row (Red borders) -->
  <rect x="120" y="220" width="140" height="45" rx="8" fill="#FFFFFF" stroke="#E52521" stroke-width="2"/>
  <text x="190" y="247" text-anchor="middle" font-size="13">Rust</text>

  <rect x="280" y="220" width="140" height="45" rx="8" fill="#FFFFFF" stroke="#E52521" stroke-width="2"/>
  <text x="350" y="247" text-anchor="middle" font-size="13">C/C++</text>

  <!-- Data Row (Gold border) -->
  <rect x="120" y="300" width="140" height="45" rx="8" fill="#FFFFFF" stroke="#FBD000" stroke-width="2"/>
  <text x="190" y="327" text-anchor="middle" font-size="13">SQL</text>

  <!-- Legend -->
  <rect x="520" y="300" width="260" height="45" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="1"/>
  <text x="650" y="318" text-anchor="middle" font-size="11" font-weight="bold">Legend</text>
  <text x="650" y="335" text-anchor="middle" font-size="10">Languages by primary use case</text>
</svg>