<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <style>
    text { font-family: Arial, sans-serif; fill: #333333; }
  </style>

  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" font-size="18" font-weight="bold">Git Branching Strategies</text>

  <!-- ======= GIT FLOW (Top) ======= -->
  <text x="60" y="55" font-size="14" font-weight="bold">Git Flow</text>
  <text x="160" y="55" font-size="11" fill="#999">(complex)</text>

  <!-- main branch line (blue) -->
  <line x1="100" y1="80" x2="850" y2="80" stroke="#049CD8" stroke-width="3"/>
  <circle cx="100" cy="80" r="5" fill="#049CD8"/>
  <circle cx="400" cy="80" r="5" fill="#049CD8"/>
  <circle cx="700" cy="80" r="5" fill="#049CD8"/>
  <circle cx="850" cy="80" r="5" fill="#049CD8"/>
  <text x="80" y="75" font-size="10" font-weight="bold" fill="#049CD8">main</text>

  <!-- develop branch line (green) -->
  <line x1="100" y1="115" x2="850" y2="115" stroke="#43B047" stroke-width="2"/>
  <circle cx="100" cy="115" r="4" fill="#43B047"/>
  <circle cx="250" cy="115" r="4" fill="#43B047"/>
  <circle cx="500" cy="115" r="4" fill="#43B047"/>
  <circle cx="650" cy="115" r="4" fill="#43B047"/>
  <circle cx="850" cy="115" r="4" fill="#43B047"/>
  <text x="80" y="120" font-size="10" fill="#43B047">develop</text>

  <!-- feature branch -->
  <line x1="250" y1="115" x2="300" y2="150" stroke="#43B047" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="300" y1="150" x2="450" y2="150" stroke="#43B047" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="450" y1="150" x2="500" y2="115" stroke="#43B047" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="300" cy="150" r="3" fill="#43B047"/>
  <circle cx="375" cy="150" r="3" fill="#43B047"/>
  <circle cx="450" cy="150" r="3" fill="#43B047"/>
  <text x="360" y="168" font-size="9" text-anchor="middle" fill="#43B047">feature/*</text>

  <!-- release branch (gold) -->
  <line x1="500" y1="115" x2="550" y2="97" stroke="#FBD000" stroke-width="1.5"/>
  <line x1="550" y1="97" x2="650" y2="97" stroke="#FBD000" stroke-width="1.5"/>
  <line x1="650" y1="97" x2="700" y2="80" stroke="#FBD000" stroke-width="1.5"/>
  <circle cx="550" cy="97" r="3" fill="#FBD000"/>
  <circle cx="600" cy="97" r="3" fill="#FBD000"/>
  <circle cx="650" cy="97" r="3" fill="#FBD000"/>
  <text x="600" y="92" font-size="9" text-anchor="middle" fill="#B8960A">release/*</text>

  <!-- hotfix branch (red) -->
  <line x1="400" y1="80" x2="420" y2="60" stroke="#E52521" stroke-width="1.5"/>
  <line x1="420" y1="60" x2="480" y2="60" stroke="#E52521" stroke-width="1.5"/>
  <line x1="480" y1="60" x2="500" y2="80" stroke="#E52521" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="450" cy="60" r="3" fill="#E52521"/>
  <text x="450" y="53" font-size="9" text-anchor="middle" fill="#E52521">hotfix/*</text>

  <!-- Merge back to develop from hotfix -->
  <line x1="480" y1="60" x2="500" y2="115" stroke="#E52521" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ======= GITHUB FLOW (Bottom) ======= -->
  <text x="60" y="230" font-size="14" font-weight="bold">GitHub Flow</text>
  <text x="185" y="230" font-size="11" fill="#999">(simple)</text>

  <!-- main branch line (blue) -->
  <line x1="100" y1="260" x2="850" y2="260" stroke="#049CD8" stroke-width="3"/>
  <circle cx="100" cy="260" r="5" fill="#049CD8"/>
  <circle cx="300" cy="260" r="5" fill="#049CD8"/>
  <circle cx="550" cy="260" r="5" fill="#049CD8"/>
  <circle cx="750" cy="260" r="5" fill="#049CD8"/>
  <circle cx="850" cy="260" r="5" fill="#049CD8"/>
  <text x="80" y="265" font-size="10" font-weight="bold" fill="#049CD8">main</text>

  <!-- feature branch 1 (green) -->
  <line x1="100" y1="260" x2="140" y2="295" stroke="#43B047" stroke-width="1.5"/>
  <line x1="140" y1="295" x2="260" y2="295" stroke="#43B047" stroke-width="1.5"/>
  <line x1="260" y1="295" x2="300" y2="260" stroke="#43B047" stroke-width="1.5"/>
  <circle cx="140" cy="295" r="3" fill="#43B047"/>
  <circle cx="200" cy="295" r="3" fill="#43B047"/>
  <circle cx="260" cy="295" r="3" fill="#43B047"/>
  <text x="200" y="315" font-size="9" text-anchor="middle" fill="#43B047">feature-a</text>

  <!-- PR marker -->
  <rect x="268" y="275" width="24" height="14" rx="3" fill="#43B047"/>
  <text x="280" y="285" text-anchor="middle" font-size="8" fill="#FFFFFF">PR</text>

  <!-- feature branch 2 (green) -->
  <line x1="350" y1="260" x2="390" y2="295" stroke="#43B047" stroke-width="1.5"/>
  <line x1="390" y1="295" x2="510" y2="295" stroke="#43B047" stroke-width="1.5"/>
  <line x1="510" y1="295" x2="550" y2="260" stroke="#43B047" stroke-width="1.5"/>
  <circle cx="390" cy="295" r="3" fill="#43B047"/>
  <circle cx="450" cy="295" r="3" fill="#43B047"/>
  <circle cx="510" cy="295" r="3" fill="#43B047"/>
  <text x="450" y="315" font-size="9" text-anchor="middle" fill="#43B047">feature-b</text>

  <!-- PR marker -->
  <rect x="518" y="275" width="24" height="14" rx="3" fill="#43B047"/>
  <text x="530" y="285" text-anchor="middle" font-size="8" fill="#FFFFFF">PR</text>

  <!-- feature branch 3 -->
  <line x1="600" y1="260" x2="630" y2="295" stroke="#43B047" stroke-width="1.5"/>
  <line x1="630" y1="295" x2="720" y2="295" stroke="#43B047" stroke-width="1.5"/>
  <line x1="720" y1="295" x2="750" y2="260" stroke="#43B047" stroke-width="1.5"/>
  <circle cx="675" cy="295" r="3" fill="#43B047"/>
  <text x="675" y="315" font-size="9" text-anchor="middle" fill="#43B047">feature-c</text>

  <rect x="725" y="275" width="24" height="14" rx="3" fill="#43B047"/>
  <text x="737" y="285" text-anchor="middle" font-size="8" fill="#FFFFFF">PR</text>

  <!-- Divider -->
  <line x1="50" y1="195" x2="870" y2="195" stroke="#DDD" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Legend -->
  <rect x="30" y="350" width="350" height="35" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="1"/>
  <text x="205" y="372" text-anchor="middle" font-size="11">Legend: Git Flow (complex) vs GitHub Flow (simple)</text>
</svg>